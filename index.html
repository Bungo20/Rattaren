        function navigateLightbox(direction, event) {
            if (event) event.stopPropagation();
            const student = getActiveStudent();
            if (!student) return;

            lightboxIndex += direction;
            if (lightboxIndex >= student.images.length) lightboxIndex = 0;
            if (lightboxIndex < 0) lightboxIndex = student.images.length - 1;

            const img = document.getElementById('lightbox-img');
            const caption = document.getElementById('lightbox-caption');

            img.src = student.images[lightboxIndex];
            caption.innerText = `Sida ${lightboxIndex + 1} av ${student.images.length}`;
        }

        function handleLightboxKeyboard(e) {
            if (e.key === 'ArrowRight') navigateLightbox(1);
            else if (e.key === 'ArrowLeft') navigateLightbox(-1);
            else if (e.key === 'Escape') closeLightbox();
        }

        function initLightboxSwipe() {
            const lightbox = document.getElementById('lightbox');
            if (!lightbox) return;

            lightbox.addEventListener('touchstart', (e) => {
                swipeStartX = e.changedTouches[0].screenX;
                swipeStartY = e.changedTouches[0].screenY;
            }, { passive: true });

            lightbox.addEventListener('touchend', (e) => {
                swipeEndX = e.changedTouches[0].screenX;
                swipeEndY = e.changedTouches[0].screenY;
                handleSwipeGesture();
            }, { passive: true });
        }

        function handleSwipeGesture() {
            const diffX = swipeEndX - swipeStartX;
            const diffY = swipeEndY - swipeStartY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > 50) {
                    if (diffX > 0) {
                        navigateLightbox(-1);
                    } else {
                        navigateLightbox(1);
                    }
                }
            }
        }

        async function correctSingleStudent(studentId) {
            const apiKey = document.getElementById('apiKey').value;
            const apiUrl = document.getElementById('apiUrl').value;

            if (!apiKey) {
                showToast("Du måste ange din Berget AI API-nyckel i sidhuvudet först.", "error");
                return;
            }

            if (!navigator.onLine) {
                showToast("Du kan inte starta rättningen eftersom du är offline.", "error");
                return;
            }

            const student = session.students.find(s => s.id === studentId);
            if (!student) return;

            if (student.images.length === 0) {
                showToast("Det finns inga bilder att rätta för denna elev.", "error");
                return;
            }

            isProcessing = true;
            updateBatchButtonState();

            const singleBtn = document.getElementById('correct-single-btn');
            if (singleBtn) {
                singleBtn.disabled = true;
                singleBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Rättar...`;
            }

            let wasCancelled = false;

            student.status = 'processing';
            student.report = '';
            renderStudentList();

            if (currentView === student.id) {
                renderWorkspace();
                setWorkspaceTab('report');
            }

            try {
                currentAbortController = new AbortController();

                await callBergetAI(apiUrl, apiKey, student, currentAbortController.signal, (chunk) => {
                    student.report += chunk;

                    if (currentView === student.id) {
                        const reportTextBox = document.getElementById('report-text-box');
                        const tabBtnReport = document.getElementById('tab-btn-report');

                        if (tabBtnReport) {
                            tabBtnReport.removeAttribute('disabled');
                        }

                        if (reportTextBox) {
                            reportTextBox.innerHTML = marked.parse(student.report);
                            reportTextBox.scrollTop = reportTextBox.scrollHeight;
                        }
                    }
                });

                if (isProcessing) {
                    student.status = 'done';
                    showToast(`Rättningen klar för ${student.name}!`, "success");
                } else {
                    wasCancelled = true;
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    wasCancelled = true;
                    console.log("Anropet avbröts av användaren.");
                } else {
                    console.error("API Fel:", error);
                    if (!navigator.onLine) {
                        student.report = `Rättningen misslyckades för att du är offline. Kontrollera din internetanslutning.`;
                    } else {
                        student.report = `Ett fel uppstod vid kommunikation med Berget AI: ${error.message}`;
                    }
                    student.status = 'error';
                    showToast(`Rättningen misslyckades för ${student.name}.`, "error");
                }
            }

            resetBatchState();
            renderStudentList();
            if (currentView === student.id) renderWorkspace();
        }

        async function processBatch() {
            const apiKey = document.getElementById('apiKey').value;
            const apiUrl = document.getElementById('apiUrl').value;

            if (!apiKey) {
                showToast("Du måste ange din Berget AI API-nyckel i sidhuvudet först.", "error");
                return;
            }

            if (!navigator.onLine) {
                showToast("Du kan inte starta rättningen eftersom du är offline.", "error");
                return;
            }

            const activeStudents = session.students.filter(s => s.images.length > 0);
            if (activeStudents.length === 0) {
                showToast("Det finns inga elever med uppladdade bilder i kön.", "error");
                return;
            }

            isProcessing = true;
            const startBtn = document.getElementById('start-btn');
            const stopBtn = document.getElementById('stop-btn');

            startBtn.disabled = true;
            startBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Bearbetar kö...`;
            stopBtn.style.display = 'inline-flex';
            updateExportAllButtonState();

            let successCount = 0;
            let errorCount = 0;
            let wasCancelled = false;

            for (let student of session.students) {
                if (!isProcessing) {
                    wasCancelled = true;
                    break;
                }
                if (student.images.length === 0) continue;

                if (!navigator.onLine) {
                    student.status = 'error';
                    student.report = 'Rättningen avbröts eftersom du är offline. Anslut till internet och försök igen.';
                    errorCount++;
                    renderStudentList();
                    if (currentView === student.id) renderWorkspace();
                    continue;
                }

                student.status = 'processing';
                student.report = '';
                renderStudentList();

                if (currentView === student.id) {
                    renderWorkspace();
                    setWorkspaceTab('report');
                }

                try {
                    currentAbortController = new AbortController();

                    await callBergetAI(apiUrl, apiKey, student, currentAbortController.signal, (chunk) => {
                        student.report += chunk;

                        if (currentView === student.id) {
                            const reportTextBox = document.getElementById('report-text-box');
                            const tabBtnReport = document.getElementById('tab-btn-report');

                            if (tabBtnReport) {
                                tabBtnReport.removeAttribute('disabled');
                            }

                            if (reportTextBox) {
                                reportTextBox.innerHTML = marked.parse(student.report);
                                reportTextBox.scrollTop = reportTextBox.scrollHeight;
                            }
                        }
                    });

                    if (isProcessing) {
                        student.status = 'done';
                        successCount++;
                    } else {
                        wasCancelled = true;
                    }
                } catch (error) {
                    if (error.name === 'AbortError') {
                        wasCancelled = true;
                        console.log("Anropet avbröts av användaren.");
                    } else {
                        console.error("API Fel:", error);
                        errorCount++;
                        if (!navigator.onLine) {
                            student.report = `Rättningen misslyckades för att du är offline. Kontrollera din internetanslutning.`;
                        } else {
                            student.report = `Ett fel uppstod vid kommunikation med Berget AI: ${error.message}`;
                        }
                        student.status = 'error';
                    }
                }

                renderStudentList();
                if (currentView === student.id) renderWorkspace();
            }

            resetBatchState();

            if (!wasCancelled) {
                if (errorCount > 0) {
                    if (successCount === 0) {
                        showToast("Rättningen misslyckades. Kontrollera din internetanslutning eller API-nyckel.", "error");
                    } else {
                        showToast(`Rättningen klar. ${successCount} lyckades, ${errorCount} misslyckades.`, "warning");
                    }
                } else {
                    showToast("Rättningen är klar för alla elever i kön!", "success");
                }
            }
        }

        function cancelBatch() {
            if (!isProcessing) return;
            isProcessing = false;

            if (currentAbortController) {
                currentAbortController.abort();
            }

            showToast("Körningen avbröts av användaren.", "error");

            session.students.forEach(s => {
                if (s.status === 'processing') {
                    s.status = 'error';
                    s.report += "\n\n[Rättningen avbröts av användaren]";
                }
            });

            resetBatchState();
            renderStudentList();
            renderWorkspace();
        }

        function resetBatchState() {
            isProcessing = false;
            currentAbortController = null;

            const startBtn = document.getElementById('start-btn');
            const stopBtn = document.getElementById('stop-btn');

            if (startBtn) {
                startBtn.disabled = false;
                startBtn.innerHTML = `<i class="fa-solid fa-play"></i> Rätta alla`;
            }
            if (stopBtn) {
                stopBtn.style.display = 'none';
            }
            updateBatchButtonState();
            updateExportAllButtonState();
        }

        async function callBergetAI(url, key, student, signal, onChunk) {
            const contentArray = [];

            const selectedPromptId = localStorage.getItem('rattaren_selected_prompt_id') || 'standard';
            const template = PROMPT_TEMPLATES.find(t => t.id === selectedPromptId) || PROMPT_TEMPLATES[0];
            const customText = localStorage.getItem(`rattaren_custom_prompt_${selectedPromptId}`);
            let rawPromptText = customText !== null ? customText : template.defaultText;

            const promptText = rawPromptText.replace(/{studentName}/g, student.name);

            let finalPromptText = "";
            if (session.shared.customInstructions && session.shared.customInstructions.trim()) {
                finalPromptText += `Gemensamma instruktioner eller frågor:\n${session.shared.customInstructions.trim()}\n\n`;
            }
            finalPromptText += promptText;
            if (student.customInstructions && student.customInstructions.trim()) {
                finalPromptText += `\n\nSärskilda instruktioner för denna rättning: ${student.customInstructions.trim()}`;
            }

            contentArray.push({
                type: "text",
                text: finalPromptText
            });

            // Prepend shared images if any
            const hasSharedImages = session.shared.images && session.shared.images.length > 0;
            if (hasSharedImages) {
                session.shared.images.forEach((base64, index) => {
                    contentArray.push({ type: "text", text: `[Gemensamt underlag - Sida ${index + 1}]` });
                    contentArray.push({
                        type: "image_url",
                        image_url: { url: base64 }
                    });
                });
            }

            student.images.forEach((base64, index) => {
                const label = hasSharedImages ? `[Elevens provsida ${index + 1}]` : `[Provsida ${index + 1}]`;
                contentArray.push({ type: "text", text: label });
                contentArray.push({
                    type: "image_url",
                    image_url: { url: base64 }
                });
            });

            const modelSelectVal = document.getElementById('modelSelect').value;
            const payload = {
                model: modelSelectVal || "moonshotai/Kimi-K2.6",
                messages: [
                    {
                        role: "user",
                        content: contentArray
                    }
                ],
                temperature: 0.3,
                stream: true
            };

            const response = await fetch(url, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${key}`
                },
                body: JSON.stringify(payload),
                signal: signal
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errText}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            let buffer = "";

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split("\n");

                buffer = lines.pop();

                for (const line of lines) {
                    const cleanedLine = line.trim();
                    if (!cleanedLine) continue;
                    if (cleanedLine === "data: [DONE]") continue;

                    if (cleanedLine.startsWith("data: ")) {
                        try {
                            const jsonStr = cleanedLine.slice(6);
                            const parsed = JSON.parse(jsonStr);
                            const deltaContent = parsed.choices?.[0]?.delta?.content || "";
                            if (deltaContent) {
                                onChunk(deltaContent);
                            }
                        } catch (e) {
                            console.warn("Kunde inte tolka strömmande rad:", cleanedLine, e);
                        }
                    }
                }
            }
        }

        function exportToWord() {
            const student = getActiveStudent();
            if (!student || !student.report) return;

            const htmlContent = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><title>Rättningsrapport: ${student.name}</title>
                <style>
                    body { font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; color: #333; margin: 40px; }
                    h2 { color: #1e3a8a; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; }
                    p { font-size: 11pt; margin-bottom: 12px; }
                    ul, ol { margin-left: 20px; }
                    li { font-size: 11pt; margin-bottom: 6px; }
                </style>
                </head>
                <body>
                    <h2>Rättningsrapport: ${student.name}</h2>
                    <div style="margin-top: 20px;">
                        ${marked.parse(student.report)}
                    </div>
                </body>
                </html>
            `;

            const blob = new Blob(['\ufeff' + htmlContent], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Rattning_${student.name.replace(/\s+/g, '_')}.docx`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast("Rapport nedladdad som Word-fil!", "success");
        }

        function exportAllReportsToWord() {
            const completedStudents = session.students.filter(s => s.report && s.status === 'done');
            if (completedStudents.length === 0) {
                showToast("Det finns inga klara rapporter att ladda ner.", "error");
                return;
            }

            let combinedHtml = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head>
                    <title>Samlade Rättningsrapporter</title>
                    <style>
                        body { font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; color: #333; margin: 40px; }
                        h1 { color: #1e3a8a; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; margin-top: 0; }
                        h2 { color: #1e3a8a; border-bottom: 2px solid #e2e8f0; padding-bottom: 6px; margin-top: 24px; }
                        p { font-size: 11pt; margin-bottom: 12px; }
                        ul, ol { margin-left: 20px; }
                        li { font-size: 11pt; margin-bottom: 6px; }
                        .page-break { page-break-before: always; }
                    </style>
                </head>
                <body>
            `;

            completedStudents.forEach((student, index) => {
                const pageBreakClass = index > 0 ? 'class="page-break"' : '';
                combinedHtml += `
                    <div ${pageBreakClass}>
                        <h1>Rättningsrapport: ${student.name}</h1>
                        <div style="margin-top: 20px;">
                            ${marked.parse(student.report)}
                        </div>
                    </div>
                `;
            });

            combinedHtml += `
                </body>
                </html>
            `;

            const blob = new Blob(['\ufeff' + combinedHtml], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Alla_Rattningsrapporter_${new Date().toISOString().slice(0, 10)}.docx`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast("Alla rapporter har laddats ner i ett samlat dokument!", "success");
        }

        function exportToEmail() {
            const student = getActiveStudent();
            if (!student || !student.report) return;

            const subject = encodeURIComponent(`Rättningsrapport: ${student.name}`);
            const body = encodeURIComponent(student.report);

            window.location.href = `mailto:?subject=${subject}&body=${body}`;
        }

        function exportAllReportsToEmail() {
            const completedStudents = session.students.filter(s => s.report && s.status === 'done');
            if (completedStudents.length === 0) {
                showToast("Det finns inga klara rapporter att maila.", "error");
                return;
            }

            const subject = encodeURIComponent(`Samlade Rättningsrapporter - ${new Date().toISOString().slice(0, 10)}`);

            let combinedBody = '';
            completedStudents.forEach((student, index) => {
                if (index > 0) {
                    combinedBody += '\n\n==================================================\n\n';
                }
                combinedBody += `Rättningsrapport: ${student.name}\n\n${student.report}`;
            });

            const body = encodeURIComponent(combinedBody);
            window.location.href = `mailto:?subject=${subject}&body=${body}`;
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('rattaren_theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

            const isDark = savedTheme === 'dark' || (!savedTheme && systemPrefersDark);
            if (isDark) {
                document.body.classList.add('dark-theme');
            } else {
                document.body.classList.remove('dark-theme');
            }
            updateThemeToggleIcon(isDark);
        }

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark-theme');
            localStorage.setItem('rattaren_theme', isDark ? 'dark' : 'light');
            updateThemeToggleIcon(isDark);
        }

        function updateThemeToggleIcon(isDark) {
            const themeBtn = document.getElementById('theme-toggle-btn');
            if (themeBtn) {
                themeBtn.innerHTML = isDark ? '<i class="fa-solid fa-sun" style="color: #f59e0b;"></i>' : '<i class="fa-solid fa-moon"></i>';
            }
        }

        window.onload = function () {
            initTheme();
            initPromptSettings();
            initLightboxSwipe();
            updateOnlineStatus();
            if (session.students.length === 0) {
                const firstStudent = {
                    id: Date.now(),
                    name: "Elev 1",
                    images: [],
                    report: '',
                    status: 'pending',
                    customInstructions: ''
                };
                session.students.push(firstStudent);
                currentView = firstStudent.id;
            }
            updateBatchButtonState();
            renderStudentList();
            renderWorkspace();

            if (document.getElementById('apiKey').value) {
                updateModelsDropdown();
            } else {
                updateSelectedModelDisplay();
            }
        };
    </script>
