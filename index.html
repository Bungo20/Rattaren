<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Rättaren</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 640 512'%3E%3Cpath fill='%232563eb' d='M320 32c-8.1 0-16.1 1.4-23.7 4.1L15.8 137.4C6.3 140.9 0 149.9 0 160s6.3 19.1 15.8 22.6l57.9 20.9C57.3 229.3 48 259.8 48 291.9v28.1c0 28.4-10.8 57.7-22.3 80.8c-6.5 13-13.9 25.8-22.5 37.6C0 442.7-.9 448.3 .9 453.4s6 8.9 11.2 10.2l64 16c4.2 1.1 8.7 .3 12.4-2s6.3-6.1 7.1-10.4c8.6-42.8 4.3-81.2-2.1-108.7C90.3 344.3 86 329.8 80 316.5V291.9c0-30.2 10.2-58.7 27.9-81.5c12.9-15.5 29.6-28 49.2-35.7l157-61.7c8.2-3.2 17.5 .8 20.7 9s-.8 17.5-9 20.7l-157 61.7c-12.4 4.9-23.3 12.4-32.2 21.6l159.6 57.6c7.6 2.7 15.6 4.1 23.7 4.1s16.1-1.4 23.7-4.1L624.2 182.6c9.5-3.4 15.8-12.5 15.8-22.6s-6.3-19.1-15.8-22.6L343.7 36.1C336.1 33.4 328.1 32 320 32zM128 408c0 35.3 86 72 192 72s192-36.7 192-72L496.7 262.6 354.5 314c-11.1 4-22.8 6-34.5 6s-23.5-2-34.5-6L143.3 262.6 128 408z'/%3E%3C/svg%3E">
    <!-- Lägg till FontAwesome för snygga och moderna ikoner -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Lägg till Marked.js för att rendera strömmande Markdown till HTML -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-light: #eff6ff;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --border-hover: #cbd5e1;
            --success: #16a34a;
            --danger: #ef4444;
            --radius-lg: 12px;
            --radius-md: 8px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --tab-bg: #f1f5f9;
        }

        /* Mörkt läge färgvariabler */
        body.dark-theme {
            --bg: #0b0f19;
            --card-bg: #151f32;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #1e293b;
            --border-hover: #334155;
            --primary-light: rgba(37, 99, 235, 0.15);
            --tab-bg: #0f172a;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.5);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 24px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Flik-design för att minska scrollande */
        .workspace-tabs {
            display: flex;
            gap: 4px;
            background: var(--tab-bg);
            padding: 4px;
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .tab-btn:hover:not(:disabled) {
            color: var(--text);
            background: rgba(255, 255, 255, 0.5);
        }

        .tab-btn.active {
            background: var(--card-bg);
            color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .tab-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        h1 {
            font-size: 1.6rem;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h1 i {
            color: var(--primary);
        }

        .api-config {
            display: flex;
            gap: 10px;
            align-items: center;
            background: var(--card-bg);
            padding: 10px 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            flex-wrap: wrap;
            width: auto;
        }

        .api-config input {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .api-config input:focus {
            border-color: var(--primary);
        }

        .api-config select {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
            background-color: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            transition: border-color 0.2s;
            max-width: 220px;
        }

        .api-config select:focus {
            border-color: var(--primary);
        }

        .api-config select:disabled {
            background-color: var(--bg);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .main-layout {
            display: flex;
            flex-direction: column;
            gap: 24px;
            flex: 1;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .section-title {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-item {
            padding: 14px 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            cursor: pointer;
            background: var(--bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .nav-item:hover {
            border-color: var(--border-hover);
            transform: translateY(-1px);
        }

        .nav-item.active {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
            font-weight: 600;
            box-shadow: var(--shadow-sm);
        }

        .nav-item .badge {
            background: var(--text-muted);
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .nav-item.active .badge {
            background: var(--primary);
        }

        .student-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            flex: 1;
            padding-right: 4px;
        }

        .student-list::-webkit-scrollbar {
            width: 6px;
        }

        .student-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            user-select: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--tab-bg);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border-hover);
        }

        .btn-danger-outline {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid transparent;
            padding: 6px;
            border-radius: 4px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-danger-outline:hover {
            color: var(--danger);
            background: #fee2e2;
            border-color: #fecaca;
        }

        .btn-edit-outline {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid transparent;
            padding: 6px;
            border-radius: 4px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-edit-outline:hover {
            color: var(--primary);
            background: var(--primary-light);
            border-color: #bfdbfe;
        }

        .btn-success {
            background: var(--success);
            color: white;
            width: 100%;
            padding: 14px;
            font-size: 1rem;
        }

        .btn-success:hover {
            background: #15803d;
            box-shadow: var(--shadow-md);
        }

        .btn-success:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            width: 100%;
            padding: 14px;
            font-size: 1rem;
        }

        .btn-danger:hover {
            background: #b91c1c;
            box-shadow: var(--shadow-md);
        }

        .sidebar-actions {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .workspace {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            box-shadow: var(--shadow-sm);
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 16px 20px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .toast.active {
            transform: translateY(0);
            opacity: 1;
        }

        /* Offline Banner */
        .offline-banner {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fee2e2;
            padding: 12px 16px;
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
        }

        body.dark-theme .offline-banner {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border-color: rgba(239, 68, 68, 0.2);
        }

        /* Lightbox (Helskärmsvisning) */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(8px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        #lightbox-img {
            max-width: 90%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .lightbox-close {
            position: absolute;
            top: 24px;
            right: 24px;
            background: transparent;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }

        .lightbox-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-prev {
            left: 24px;
        }

        .lightbox-next {
            right: 24px;
        }

        .lightbox-caption {
            position: absolute;
            bottom: 24px;
            color: white;
            font-size: 1rem;
            background: rgba(0, 0, 0, 0.6);
            padding: 4px 16px;
            border-radius: var(--radius-md);
        }

        /* Snabbkamera Modal */
        .camera-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .camera-modal.active {
            display: flex;
        }

        .camera-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #camera-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .camera-flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 30;
        }

        .camera-flash.flash-active {
            animation: cameraFlashAnim 0.3s ease-out;
        }

        @keyframes cameraFlashAnim {
            0% {
                opacity: 1;
            }

            15% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        .camera-close-btn {
            position: absolute;
            bottom: 52px;
            right: 40px;
            height: 48px;
            background: rgba(22, 163, 74, 0.9);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        .camera-close-btn:hover {
            background: rgba(22, 163, 74, 1);
            transform: scale(1.05);
        }

        .camera-ui {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            z-index: 20;
        }

        .camera-counter {
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 14px;
            border-radius: 14px;
            font-size: 0.9rem;
        }

        .camera-shutter {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: white;
            border: 4px solid rgba(255, 255, 255, 0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .shutter-inner {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: white;
            border: 2px solid #000;
        }

        /* Bekräftelse Modal */
        .confirm-modal,
        .settings-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0);
            backdrop-filter: blur(0px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            transition: background 0.25s ease, backdrop-filter 0.25s ease;
        }

        .confirm-modal.active,
        .settings-modal.active {
            display: flex;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px);
        }

        .confirm-content,
        .settings-content {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 500px;
            box-shadow: var(--shadow-lg);
            transform: scale(0.9);
            opacity: 0;
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease;
        }

        .confirm-content {
            max-width: 400px;
            text-align: center;
        }

        .confirm-modal.active .confirm-content,
        .settings-modal.active .settings-content {
            transform: scale(1);
            opacity: 1;
        }

        .confirm-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .confirm-actions .btn {
            flex: 1;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .settings-close {
            background: transparent;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        .form-group label {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            outline: none;
        }

        .prompt-textarea {
            height: 200px;
            resize: vertical;
            font-family: monospace;
        }

        /* Filmremsa / Bilder */
        .filmstrip {
            position: relative;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(95px, 1fr));
            gap: 12px;
            background: var(--tab-bg);
            padding: 12px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
        }

        .image-card {
            position: relative;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            background: var(--card-bg);
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.2s, opacity 0.2s;
            will-change: transform, box-shadow;
        }

        .image-card:hover {
            transform: translateY(-2px);
        }

        .image-card.dragging {
            opacity: 0.5;
            transform: scale(1.05) translate3d(0, 0, 0);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--primary);
        }

        /* Klass som markerar det kort som "lyfts" av touch-ghost-draget */
        .image-card.touch-dragging-source {
            opacity: 0.3;
            transform: scale(0.92);
            border: 2px dashed var(--primary);
            box-shadow: none;
        }

        /* Flytande ghost-klon som följer fingret */
        .touch-drag-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            border-radius: var(--radius-md);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3), 0 0 0 2px var(--primary);
            opacity: 0.88;
            overflow: hidden;
            will-change: left, top;
        }

        .touch-drag-ghost img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Insättningsmarkör – en tydlig vertikal linje som visar var bilden hamnar */
        .touch-drop-marker {
            position: absolute;
            top: -4px;
            bottom: -4px;
            width: 4px;
            background: var(--primary);
            border-radius: 4px;
            box-shadow: 0 0 12px var(--primary), 0 0 4px var(--primary);
            z-index: 200;
            pointer-events: none;
            transition: left 0.1s ease, right 0.1s ease;
        }

        .touch-drop-marker::before,
        .touch-drop-marker::after {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
        }

        .touch-drop-marker::before {
            top: -4px;
        }

        .touch-drop-marker::after {
            bottom: -4px;
        }

        .add-student-pill {
            border: 1.5px dashed var(--primary) !important;
            background: transparent !important;
            justify-content: center !important;
            min-width: 130px !important;
            display: inline-flex !important;
            align-items: center;
        }

        .add-student-pill:hover {
            background: var(--primary-light) !important;
        }

        /* Lodräta linje-indikatorer som ritas i gapen mellan bilderna vid drag och drop (desktop) */
        .image-card.drop-indicator-left::before {
            content: '';
            position: absolute;
            left: -10px;
            top: -2px;
            bottom: -2px;
            width: 4px;
            background: var(--primary);
            border-radius: 4px;
            box-shadow: 0 0 8px var(--primary);
            z-index: 100;
        }

        .image-card.drop-indicator-right::after {
            content: '';
            position: absolute;
            right: -10px;
            top: -2px;
            bottom: -2px;
            width: 4px;
            background: var(--primary);
            border-radius: 4px;
            box-shadow: 0 0 8px var(--primary);
            z-index: 100;
        }

        /* Bildyta – klickbar för lightbox */
        .image-card .card-image-wrapper {
            position: relative;
            aspect-ratio: 3/4;
            cursor: pointer;
            border-radius: var(--radius-md) var(--radius-md) 0 0;
            overflow: hidden;
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .image-card .delete-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        /* Drag-handtags-bar under bilden */
        .drag-handle-bar {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 6px;
            background: var(--tab-bg);
            border-top: 1px solid var(--border);
            border-radius: 0 0 var(--radius-md) var(--radius-md);
            cursor: grab;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        .drag-handle-bar:active {
            cursor: grabbing;
            background: var(--primary-light);
        }

        .drag-handle-bar .grip-icon {
            color: var(--text-muted);
            font-size: 0.85rem;
            flex-shrink: 0;
            line-height: 1;
        }

        .drag-handle-bar .page-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Upload grids */
        .upload-grid-buttons {
            display: grid;
            grid-template-columns: 1fr 1.6fr;
            /* Justerad till bredare gallerikolumn enligt användarinstruktioner */
            gap: 12px;
            width: 100%;
        }

        .btn-camera-rapid {
            background: #1e293b;
            color: white;
            padding: 16px 20px;
            font-size: 1rem;
        }

        .btn-camera-rapid:hover {
            background: #0f172a;
        }

        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius-md);
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            background: var(--card-bg);
        }

        .upload-zone:hover {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        /* Badges & Status */
        .status-badge {
            font-size: 0.8rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .status-pending {
            background: #cbd5e1;
            color: #475569;
        }

        .status-processing {
            background: #fef3c7;
            color: #b45309;
        }

        .status-done {
            background: #dcfce7;
            color: #15803d;
        }

        .status-error {
            background: #fee2e2;
            color: #b91c1c;
        }

        .status-shared {
            background: #e0e7ff;
            color: #4338ca;
        }

        body.dark-theme .status-shared {
            background: rgba(99, 102, 241, 0.2);
            color: #a5b4fc;
        }

        .model-display-badge {
            background: var(--primary-light);
            color: var(--primary);
            border: 1px solid #bfdbfe;
            padding: 8px 12px;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 60px 20px;
            color: var(--text-muted);
            text-align: center;
        }

        .empty-state i {
            font-size: 3rem;
            color: var(--border-hover);
        }

        /* Header actions */
        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* Report */
        .report-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .export-group {
            display: flex;
            gap: 12px;
        }

        .report-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
            line-height: 1.6;
        }

        .report-box h1,
        .report-box h2,
        .report-box h3 {
            margin-top: 16px;
            margin-bottom: 8px;
            color: var(--text);
        }

        .report-box p {
            margin-bottom: 12px;
        }

        .report-box ul,
        .report-box ol {
            margin-left: 20px;
            margin-bottom: 12px;
        }

        /* Camera overlay & Switch styles */
        .camera-switch-btn {
            position: absolute;
            bottom: 52px;
            left: 40px;
            width: 48px;
            height: 48px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            cursor: pointer;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .camera-switch-btn i {
            font-size: 1.4rem;
        }

        .camera-switch-btn:hover {
            background: rgba(15, 23, 42, 0.8);
            transform: scale(1.05);
        }


        /* MEDIA QUERIES FOR ADAPTIVE LAYOUTS */
        @media (max-width: 1024px) {
            .workspace {
                padding: 20px;
            }
        }

        @media (max-width: 768px) {

            html,
            body {
                overflow-x: hidden;
            }

            body {
                padding: 12px;
            }

            header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                gap: 8px;
                padding-bottom: 12px;
                margin-bottom: 16px;
            }

            header h1 {
                font-size: 1.3rem;
            }

            .header-actions {
                width: auto;
                justify-content: flex-end;
                gap: 6px;
            }

            .model-display-badge {
                display: none !important;
            }

            .toast {
                left: 16px !important;
                right: 16px !important;
                justify-content: center;
                text-align: center;
            }

            .workspace {
                padding: 16px;
                gap: 16px;
                border-radius: var(--radius-md);
                width: 100%;
                max-width: 100%;
                box-sizing: border-box;
                overflow-x: hidden;
            }

            .upload-grid-buttons {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .export-group {
                flex-direction: column;
                gap: 8px;
                width: 100%;
            }

            .export-group .btn {
                width: 100%;
            }

            .filmstrip {
                grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
                gap: 10px;
                padding: 10px;
            }

            .image-card img {
                height: 100%;
                width: 100%;
                object-fit: cover;
            }

            .image-card .delete-btn {
                opacity: 1;
                width: 36px;
                height: 36px;
                font-size: 16px;
                top: 4px;
                right: 4px;
            }

            .lightbox-btn {
                width: 48px;
                height: 48px;
                font-size: 16px;
            }

            .lightbox-prev {
                left: 10px;
            }

            .lightbox-next {
                right: 10px;
            }

            .camera-close-btn {
                right: 16px;
                padding: 0 16px;
                font-size: 0.9rem;
            }

            .camera-switch-btn {
                left: 16px;
            }
        }

        /* Elev-specifika prompt-instruktioner */
        .student-instruction-wrapper {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .student-instruction-input {
            padding: 10px 14px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            font-size: 0.95rem;
            width: 100%;
            outline: none;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        .student-instruction-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }
    </style>
</head>

<body>

    <div id="offline-banner" class="offline-banner" style="display: none;">
        <i class="fa-solid fa-wifi-slash"></i>
        <span>Du är för närvarande offline. Vissa funktioner, som rättning, fungerar inte utan
            internetanslutning.</span>
    </div>

    <header>
        <h1><i class="fa-solid fa-graduation-cap"></i> AI Rättaren</h1>
        <div class="header-actions">
            <span id="model-display" class="model-display-badge">
                <i class="fa-solid fa-robot"></i>
                <span id="current-model-name">Ingen modell vald</span>
            </span>
            <button class="btn btn-secondary" onclick="openPromptModal()" title="Välj prompt">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Prompt
            </button>
            <button class="btn btn-secondary" onclick="openSettingsModal()" title="Inställningar">
                <i class="fa-solid fa-gear"></i> Inställningar
            </button>
            <button class="btn btn-secondary" id="theme-toggle-btn" onclick="toggleTheme()" title="Växla färgtema"
                style="padding: 10px 14px;">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </header>

    <div class="main-layout">
        <!-- HÖGERPANEL: ARBETSYTA FÖR BILDER OCH RESULTAT -->
        <div class="workspace" id="workspace-container">
            <!-- Renderas dynamiskt baserat på om det finns elever eller ej -->
        </div>
    </div>

    <!-- HELSKÄRMS-LIGHTBOX -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
        <button class="lightbox-close" onclick="closeLightbox(event)"><i class="fa-solid fa-xmark"></i></button>
        <button class="lightbox-btn lightbox-prev" onclick="navigateLightbox(-1, event)"><i
                class="fa-solid fa-chevron-left"></i></button>
        <img id="lightbox-img" src="" alt="Helskärmsvisning" onclick="event.stopPropagation()">
        <button class="lightbox-btn lightbox-next" onclick="navigateLightbox(1, event)"><i
                class="fa-solid fa-chevron-right"></i></button>
        <div id="lightbox-caption" class="lightbox-caption">Sida X av Y</div>
    </div>

    <!-- SNABBKAMERA MODAL -->
    <div id="camera-modal" class="camera-modal">
        <div class="camera-container">
            <video id="camera-video" autoplay playsinline></video>
            <div class="camera-flash" id="camera-flash"></div>
            <!-- Klar-knappen delar horisontell mittlinje med slutarknappen -->
            <button class="camera-close-btn" onclick="stopCamera()">
                <i class="fa-solid fa-circle-check"></i> Klar
            </button>
            <!-- Byt kamera-knapp för mobila enheter -->
            <button id="camera-switch-btn" class="camera-switch-btn" onclick="switchCamera()" title="Byt kamera"
                style="display: none;">
                <i class="fa-solid fa-camera-rotate"></i>
            </button>
            <div class="camera-ui">
                <div class="camera-counter" id="camera-counter">Tagna bilder: 0</div>
                <button class="camera-shutter" onclick="captureSnapshot()">
                    <div class="shutter-inner"></div>
                </button>
            </div>
        </div>
    </div>

    <!-- BEKRÄFTELSE MODAL (Helt utan browser alerts) -->
    <div id="confirm-modal" class="confirm-modal">
        <div class="confirm-content">
            <h3 id="confirm-title">Är du säker?</h3>
            <p id="confirm-message">Detta går inte ångra.</p>
            <div class="confirm-actions">
                <button class="btn btn-secondary" onclick="handleConfirm(false)">Avbryt</button>
                <button class="btn btn-danger" onclick="handleConfirm(true)">Ja, ta bort</button>
            </div>
        </div>
    </div>

    <!-- INSTÄLLNINGAR MODAL -->
    <div id="settings-modal" class="settings-modal" onclick="closeSettingsModal(event)">
        <div class="settings-content" onclick="event.stopPropagation()">
            <div class="settings-header">
                <h3><i class="fa-solid fa-gear"></i> Inställningar</h3>
                <button class="settings-close" onclick="closeSettingsModal(event)">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="settings-body">
                <div class="form-group">
                    <label for="apiKey">Berget API-nyckel</label>
                    <input type="password" id="apiKey" placeholder="API-nyckel (Sparas lokalt)">
                </div>
                <div class="form-group">
                    <label for="apiUrl">Berget API URL</label>
                    <input type="text" id="apiUrl" placeholder="Berget API URL"
                        value="https://api.berget.ai/v1/chat/completions">
                </div>
                <div class="form-group">
                    <label for="modelSelect">Vision-modell</label>
                    <select id="modelSelect" title="Välj vision-modell" disabled>
                        <option value="">Ange API-nyckel först...</option>
                    </select>
                </div>
            </div>
            <div style="display: flex; justify-content: flex-end; margin-top: 8px;">
                <button class="btn btn-primary" onclick="closeSettingsModal(event)" style="padding: 10px 24px;">
                    Klar
                </button>
            </div>
        </div>
    </div>

    <!-- PROMPT VAL & REDIGERING MODAL -->
    <div id="prompt-modal" class="settings-modal" onclick="closePromptModal(event)">
        <div class="settings-content" onclick="event.stopPropagation()" style="max-width: 650px;">
            <div class="settings-header">
                <h3><i class="fa-solid fa-wand-magic-sparkles"></i> Prompt-inställningar</h3>
                <button class="settings-close" onclick="closePromptModal(event)">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="settings-body" style="gap: 16px;">
                <div class="form-group">
                    <label for="promptTemplateSelect">Prompt-mall</label>
                    <select id="promptTemplateSelect" onchange="onPromptTemplateChange()" title="Välj prompt-mall">
                        <!-- Fylls i av scriptet -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="promptText">Prompt-text (Använd <code>{studentName}</code> för elevens namn)</label>
                    <textarea id="promptText" class="prompt-textarea" placeholder="Skriv din prompt här..."></textarea>
                </div>
            </div>
            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-top: 16px; flex-wrap: wrap; gap: 12px;">
                <button class="btn btn-secondary" onclick="resetActivePromptToDefault()"
                    style="border-color: #fca5a5; color: #dc2626;" title="Återställ denna mall till originalet">
                    <i class="fa-solid fa-arrow-rotate-left"></i> Återställ original
                </button>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-secondary" onclick="closePromptModal(event)">
                        Avbryt
                    </button>
                    <button class="btn btn-primary" onclick="saveAndClosePromptModal()" style="padding: 10px 24px;">
                        Spara och stäng
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ELEV-MODAL (LÄGG TILL / BYT NAMN) -->
    <div id="student-modal" class="settings-modal" onclick="closeStudentModal(event)">
        <div class="settings-content" onclick="event.stopPropagation()" style="max-width: 400px;">
            <div class="settings-header">
                <h3 id="student-modal-title">Lägg till elev</h3>
                <button class="settings-close" onclick="closeStudentModal(event)">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="settings-body">
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="student-name-input" id="student-modal-label">Elevens namn</label>
                    <input type="text" id="student-name-input" placeholder="T.ex. Johan Andersson">
                </div>
            </div>
            <div class="confirm-actions" style="margin-top: 20px;">
                <button class="btn btn-secondary" onclick="closeStudentModal(event)">Avbryt</button>
                <button class="btn btn-primary" id="student-modal-save-btn" onclick="saveStudentModal()">Spara</button>
            </div>
        </div>
    </div>

    <!-- OSYNLIG FILVÄLJARE HELT UTANFÖR UPLOAD ZONE SÅ INGA NATIVA TEXTER KAN LÄCKA UT ELLER STÖRA DESIGNEN -->
    <input type="file" id="file-input" accept="image/*" multiple onchange="handleImageUpload(event)"
        style="display: none !important;">

    <script>
        const PROMPT_TEMPLATES = [
            {
                id: 'standard',
                name: 'Standard rättningsmall',
                defaultText: `Du är en svensk legitimerad lärare som rättar ett inlämnat skriftligt prov för studenten {studentName}. 
Här är bilderna på elevens lösning i kronologisk ordning. Sidorna kan innehålla provinstruktioner i början, följt av elevens egna handskrivna eller skrivna lösningar.
Observera att elevens svar kan sträcka sig över several sidor och fortsätta naturligt på nästa bild. Analysera hela sammanhanget.

Skriv en utförlig rättningsrapport på svenska. Rapporten ska innehålla:
1. Bedömning utifrån eventuellt angivna instruktioner (eller generella betygskriterier för ämnet).
2. Elevens poäng eller indikerad betygsnivå.
3. Konstruktiv feedback med elevens specifika styrkor.
4. Utvecklingsområden och konkreta tips på hur eleven kan förbättra sina svar framöver.`
            },
            {
                id: 'snabb_feedback',
                name: 'Kompakt snabb-feedback',
                defaultText: `Du är en svensk lärare som rättar provet för {studentName}.
Ge en kortfattad och direkt feedback på svenska:
1. Preliminärt betyg/poäng.
2. Tre konkreta saker som var bra med lösningarna.
3. Två konkreta saker att arbeta vidare på.`
            },
            {
                id: 'kortfattad_feedback_uppgift',
                name: 'Kortfattad feedback per uppgift',
                defaultText: `Du är en svensk lärare som rättar provet för {studentName}.
Skriv en kortfattad feedback på svenska för varje enskild uppgift.`
            },
            {
                id: 'poangsatt_uppgifter',
                name: 'Poängsätt per uppgift och summera',
                defaultText: `Du är en svensk lärare som rättar provet för {studentName}.
Sätt poäng på varje enskild uppgift och motivera kort. Avsluta med att summera poängen för hela provet på slutet.`
            }
        ];

        let session = {
            shared: {
                id: 'shared',
                name: 'Gemensamt underlag',
                images: [],
                customInstructions: ''
            },
            students: []
        };

        function getActiveStudent() {
            if (currentView === 'shared') return session.shared;
            return session.students.find(s => s.id === currentView);
        }

        let currentView = null;
        let activeTab = 'pages'; // Sparar fliktillståndet ('pages' eller 'report')
        let draggedIndex = null;
        let lightboxIndex = 0;
        let currentAbortController = null; // Styr avbrytande av API-anrop
        let isProcessing = false; // Flagga för att spåra batch-körningens status
        let cameraStream = null; // Förvarar videoströmmen för snabbkameran
        let confirmResolve = null; // Löser bekräftelsemodalen asynkront
        let availableVideoDevices = [];
        let currentFacingMode = 'environment';
        let studentModalMode = 'add';
        let studentModalTargetId = null;

        // Variabler för touch-drag-and-drop på mobiler (ghost-system via drag-handtag)
        let touchDragState = {
            active: false,          // Är ett ghost-drag aktivt just nu?
            sourceIndex: null,      // Index för kortet som dras
            ghostEl: null,          // Det flytande ghost-elementet
            markerEl: null,         // Insättningsmarkören
            startX: 0,
            startY: 0,
            offsetX: 0,             // Förskjutning från fingret till ghostens övre vänstra hörn
            offsetY: 0,
            insertBeforeIndex: null, // Index där bilden ska infogas
            pendingCard: null,      // Kortet som väntar på att ghost ska starta
            pendingIndex: null,     // Index för pendingCard
            dragStarted: false      // Om ghost-draget har startats efter tröskel
        };

        // Felfria drag n drop-variabler för att sära på klick och drag
        let dragOccurred = false;
        let blockLightbox = false; // Säkerhetsspärr för att separera drag och klick

        // Touch-gest-variabler för swipe i lightbox
        let swipeStartX = 0;
        let swipeEndX = 0;
        let swipeStartY = 0;
        let swipeEndY = 0;

        // Konfigurera Marked.js så att vanliga radbrytningar bryts till <br> i Markdown
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        // Läs sparad API-nyckel och URL från localStorage
        document.getElementById('apiKey').value = localStorage.getItem('berget_api_key') || '';
        document.getElementById('apiUrl').value = localStorage.getItem('berget_api_url') || 'https://api.berget.ai/v1/chat/completions';

        let debounceTimer;
        document.getElementById('apiKey').addEventListener('input', (e) => {
            localStorage.setItem('berget_api_key', e.target.value);
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(updateModelsDropdown, 600);
        });

        document.getElementById('apiUrl').addEventListener('input', (e) => {
            localStorage.setItem('berget_api_url', e.target.value);
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(updateModelsDropdown, 600);
        });

        document.getElementById('modelSelect').addEventListener('change', (e) => {
            localStorage.setItem('berget_selected_model', e.target.value);
            updateSelectedModelDisplay();
        });

        function initPromptSettings() {
            const select = document.getElementById('promptTemplateSelect');
            if (!select) return;

            select.innerHTML = '';
            PROMPT_TEMPLATES.forEach(template => {
                const option = document.createElement('option');
                option.value = template.id;
                option.textContent = template.name;
                select.appendChild(option);
            });

            const activeId = localStorage.getItem('rattaren_selected_prompt_id') || 'standard';
            select.value = activeId;

            loadSelectedPromptText(activeId);
        }

        function loadSelectedPromptText(templateId) {
            const textarea = document.getElementById('promptText');
            if (!textarea) return;

            const customText = localStorage.getItem(`rattaren_custom_prompt_${templateId}`);
            if (customText !== null) {
                textarea.value = customText;
            } else {
                const template = PROMPT_TEMPLATES.find(t => t.id === templateId) || PROMPT_TEMPLATES[0];
                textarea.value = template.defaultText;
            }
        }

        function openPromptModal() {
            initPromptSettings();
            const modal = document.getElementById('prompt-modal');
            if (!modal) return;
            modal.style.display = 'flex';
            void modal.offsetHeight;
            modal.classList.add('active');
            document.addEventListener('keydown', handlePromptModalKeyboard);
        }

        function closePromptModal(event) {
            if (event) event.stopPropagation();
            const modal = document.getElementById('prompt-modal');
            if (!modal) return;
            modal.classList.remove('active');
            setTimeout(() => {
                if (!modal.classList.contains('active')) {
                    modal.style.display = 'none';
                }
            }, 250);
            document.removeEventListener('keydown', handlePromptModalKeyboard);
        }

        function handlePromptModalKeyboard(e) {
            if (e.key === 'Escape') closePromptModal();
        }

        function onPromptTemplateChange() {
            const select = document.getElementById('promptTemplateSelect');
            if (!select) return;
            loadSelectedPromptText(select.value);
        }

        function resetActivePromptToDefault() {
            const select = document.getElementById('promptTemplateSelect');
            if (!select) return;
            const templateId = select.value;

            localStorage.removeItem(`rattaren_custom_prompt_${templateId}`);
            loadSelectedPromptText(templateId);
            showToast("Mallen har återställts till originalet.", "success");
        }

        function saveAndClosePromptModal() {
            const select = document.getElementById('promptTemplateSelect');
            const textarea = document.getElementById('promptText');
            if (!select || !textarea) return;

            const templateId = select.value;
            const textVal = textarea.value;

        function updateSelectedModelDisplay() {
            const modelSelect = document.getElementById('modelSelect');
            const displayEl = document.getElementById('current-model-name');
            if (displayEl) {
                if (modelSelect && modelSelect.value) {
                    const selectedOption = modelSelect.options[modelSelect.selectedIndex];
                    displayEl.textContent = selectedOption ? selectedOption.textContent : modelSelect.value;
                } else {
                    displayEl.textContent = "Ingen modell vald";
                }
            }
        }

        async function updateModelsDropdown() {
            const apiKey = document.getElementById('apiKey').value;
            const modelSelect = document.getElementById('modelSelect');
            if (!apiKey) {
                modelSelect.innerHTML = '<option value="">Ange API-nyckel först...</option>';
                modelSelect.disabled = true;
                updateSelectedModelDisplay();
                return;
            }

            modelSelect.innerHTML = '<option value="">Hämtar modeller...</option>';
            modelSelect.disabled = true;
            updateSelectedModelDisplay();

            try {
                const apiUrlVal = document.getElementById('apiUrl').value;
                let modelsUrl = 'https://api.berget.ai/v1/models';
                if (apiUrlVal) {
                    try {
                        const urlObj = new URL(apiUrlVal);
                        urlObj.pathname = urlObj.pathname.replace(/\/chat\/completions\/?$/, '/models');
                        modelsUrl = urlObj.toString();
                    } catch (e) {
                        console.warn("Kunde inte parsa API URL för att bygga modellsökväg, använder fallback", e);
                    }
                }

                const response = await fetch(modelsUrl, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                const models = Array.isArray(data) ? data : (data.data || []);
                const visionModels = models.filter(m => m.capabilities && m.capabilities.vision === true);

                if (visionModels.length === 0) {
                    modelSelect.innerHTML = '<option value="">Inga vision-modeller</option>';
                    updateSelectedModelDisplay();
                    return;
                }

                modelSelect.innerHTML = '';
                visionModels.forEach(model => {
                    const opt = document.createElement('option');
                    opt.value = model.id;
                    opt.textContent = model.name || model.id;
                    modelSelect.appendChild(opt);
                });

                modelSelect.disabled = false;

                const savedModel = localStorage.getItem('berget_selected_model');
                const defaultPreferredModel = "moonshotai/Kimi-K2.6";
                const optionsArray = Array.from(modelSelect.options);

                let modelToSelect = null;
                if (savedModel && optionsArray.some(opt => opt.value === savedModel)) {
                    modelToSelect = savedModel;
                } else if (optionsArray.some(opt => opt.value === defaultPreferredModel)) {
                    modelToSelect = defaultPreferredModel;
                } else {
                    modelToSelect = modelSelect.value;
                }

                if (modelToSelect) {
                    modelSelect.value = modelToSelect;
                    localStorage.setItem('berget_selected_model', modelToSelect);
                }
                updateSelectedModelDisplay();
            } catch (error) {
                console.error("Misslyckades att hämta modeller:", error);
                modelSelect.innerHTML = '<option value="">Fel vid hämtning (API-nyckel?)</option>';
                modelSelect.disabled = true;
                updateSelectedModelDisplay();
            }
        }

                    // Auto-retry models list fetch if it previously failed or is empty
                    const modelSelect = document.getElementById('modelSelect');
                    if (modelSelect && (modelSelect.value === '' || modelSelect.innerHTML.includes('Fel vid hämtning') || modelSelect.innerHTML.includes('Ange API-nyckel först'))) {
                        updateModelsDropdown();
                    }
                } else {

                }
            }

        function showToast(message, type = 'info') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;

            let icon = '<i class="fa-solid fa-circle-info" style="color: var(--primary)"></i>';
            if (type === 'success') icon = '<i class="fa-solid fa-circle-check" style="color: var(--success)"></i>';
            if (type === 'error') icon = '<i class="fa-solid fa-circle-exclamation" style="color: var(--danger)"></i>';

            toast.innerHTML = `${icon} <span>${message}</span>`;
            document.body.appendChild(toast);

            setTimeout(() => toast.classList.add('active'), 10);

            setTimeout(() => {
                toast.classList.remove('active');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        function customConfirm(title, message) {
            return new Promise((resolve) => {
                const modal = document.getElementById('confirm-modal');
                if (!modal) {
                    resolve(false);
                    return;
                }
                document.getElementById('confirm-title').innerText = title;
                document.getElementById('confirm-message').innerText = message;

                modal.style.display = 'flex';
                void modal.offsetHeight;
                modal.classList.add('active');
                confirmResolve = resolve;
            });
        }

        function handleConfirm(yes) {
            const modal = document.getElementById('confirm-modal');
            if (!modal) return;
            modal.classList.remove('active');
            setTimeout(() => {
                if (!modal.classList.contains('active')) {
                    modal.style.display = 'none';
                }
            }, 250);
            if (confirmResolve) {
                confirmResolve(yes);
                confirmResolve = null;
            }
        }

                card.setAttribute('draggable', true);
                card.setAttribute('data-index', index);

                /* MOUSE DRAG & DROP EVENTS (Skrivbordsdatorer) */

                    draggedIndex = index;
                    blockLightbox = true;
                    card.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                };

                card.ondragend = () => {
                    card.classList.remove('dragging');
                    document.querySelectorAll('.image-card').forEach(el => {
                        el.classList.remove('drop-indicator-left', 'drop-indicator-right');
                    });
                    setTimeout(() => {
                        blockLightbox = false;
                    }, 150);
                };

                card.ondragover = (e) => {
                    e.preventDefault();
                    if (draggedIndex === index) return;

                    const rect = card.getBoundingClientRect();
                    const next = (e.clientX - rect.left) > (rect.width / 2);

                    document.querySelectorAll('.image-card').forEach(el => {
                        el.classList.remove('drop-indicator-left', 'drop-indicator-right');
                    });

                    if (next) {
                        if (index + 1 === draggedIndex) return;
                        card.classList.add('drop-indicator-right');
                    } else {
                        if (index - 1 === draggedIndex) return;
                        card.classList.add('drop-indicator-left');
                    }
                };

                card.ondragleave = () => {
                    card.classList.remove('drop-indicator-left', 'drop-indicator-right');
                };

                card.ondrop = (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.image-card').forEach(el => {
                        el.classList.remove('drop-indicator-left', 'drop-indicator-right');
                    });

                    const rect = card.getBoundingClientRect();
                    const next = (e.clientX - rect.left) > (rect.width / 2);
                    let targetIndex = parseInt(card.getAttribute('data-index'));

                    if (next) {
                        targetIndex = targetIndex + 1;
                    }

                    if (draggedIndex !== null && targetIndex !== draggedIndex) {
                        const movedImage = student.images.splice(draggedIndex, 1)[0];
                        let insertIndex = targetIndex;
                        if (draggedIndex < targetIndex) {
                            insertIndex--;
                        }
                        student.images.splice(insertIndex, 0, movedImage);
                        renderFilmstrip(student);
                    }
                    draggedIndex = null;
                };

                /* TOUCH DRAG & DROP – hanteras via drag-handle-bar, se nedan */

                card.innerHTML = `
                    <div class="card-image-wrapper">
                        <button class="delete-btn" onclick="deleteImage(${index}, event)" title="Ta bort bild">✕</button>
                        <img src="${base64Data}" alt="Sida ${index + 1}">
                    </div>
                    <div class="drag-handle-bar">
                        <span class="grip-icon"><i class="fa-solid fa-grip-vertical"></i></span>
                        <span class="page-label">Sida ${index + 1}</span>
                    </div>
                `;

                // Klick på bildytan öppnar lightbox
                const imageWrapper = card.querySelector('.card-image-wrapper');
                imageWrapper.addEventListener('click', (e) => {
                    if (e.target.closest('.delete-btn')) return;
                    if (blockLightbox) return;
                    openLightbox(index);
                });

                // Touch-drag startar DIREKT från handtaget (ingen lång-tryck behövs)
                const handleBar = card.querySelector('.drag-handle-bar');

                handleBar.addEventListener('touchstart', (e) => {
                    if (touchDragState.active) return;
                    e.preventDefault(); // Förhindra scroll omedelbart

                    const touch = e.touches[0];
                    touchDragState.startX = touch.clientX;
                    touchDragState.startY = touch.clientY;
                    touchDragState.pendingCard = card;
                    touchDragState.pendingIndex = index;
                    touchDragState.dragStarted = false;
                }, { passive: false });

                handleBar.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];

                    // Starta ghost-draget efter liten rörelse (5px tröskel)
                    if (!touchDragState.dragStarted) {
                        const dx = touch.clientX - touchDragState.startX;
                        const dy = touch.clientY - touchDragState.startY;
                        if (Math.abs(dx) < 5 && Math.abs(dy) < 5) return;

                        touchDragState.dragStarted = true;
                        touchDragStartGhost(touchDragState.pendingCard, touchDragState.pendingIndex, touch);
                    }

                    if (touchDragState.active) {
                        touchDragMoveGhost(touch, student);
                    }
                }, { passive: false });

                handleBar.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    if (touchDragState.active) {
                        touchDragEndGhost(student);
                    }
                    touchDragState.pendingCard = null;
                    touchDragState.pendingIndex = null;
                    touchDragState.dragStarted = false;
                });

                handleBar.addEventListener('touchcancel', () => {
                    if (touchDragState.active) {
                        touchDragCancelGhost();
                    }
                    touchDragState.pendingCard = null;
                    touchDragState.pendingIndex = null;
                    touchDragState.dragStarted = false;
                });

                container.appendChild(card);
            });
        }

        /* ====================================================================
         * TOUCH GHOST DRAG — Hjälpfunktioner för det nya mobil-dra-systemet
         * ==================================================================== */

        function touchDragStartGhost(card, index, touch) {
            touchDragState.active = true;
            touchDragState.sourceIndex = index;
            blockLightbox = true;

            // Markera källkortet som "lyft"
            card.classList.add('touch-dragging-source');

            // Skapa en enkel ghost med bara bilden (inte hela kortet)
            const imgWrapper = card.querySelector('.card-image-wrapper');
            const imgEl = card.querySelector('img');
            const wrapperRect = imgWrapper.getBoundingClientRect();

            const ghost = document.createElement('div');
            ghost.className = 'touch-drag-ghost';
            ghost.style.width = wrapperRect.width + 'px';
            ghost.style.height = wrapperRect.height + 'px';
            ghost.style.left = (touch.clientX - wrapperRect.width / 2) + 'px';
            ghost.style.top = (touch.clientY - wrapperRect.height / 2) + 'px';

            const ghostImg = document.createElement('img');
            ghostImg.src = imgEl.src;
            ghost.appendChild(ghostImg);

            document.body.appendChild(ghost);
            touchDragState.ghostEl = ghost;
            touchDragState.offsetX = wrapperRect.width / 2;
            touchDragState.offsetY = wrapperRect.height / 2;

            // Skapa insättningsmarkör
            const marker = document.createElement('div');
            marker.className = 'touch-drop-marker';
            marker.style.display = 'none';
            document.getElementById('filmstrip-container').appendChild(marker);
            touchDragState.markerEl = marker;

            // Haptic feedback om tillgänglig
            if (navigator.vibrate) navigator.vibrate(30);
        }

        function touchDragMoveGhost(touch, student) {
            const ghost = touchDragState.ghostEl;
            const marker = touchDragState.markerEl;
            if (!ghost) return;

            // Flytta ghosten till fingrets position
            ghost.style.left = (touch.clientX - touchDragState.offsetX) + 'px';
            ghost.style.top = (touch.clientY - touchDragState.offsetY) + 'px';

            // Hitta närmaste insättningspunkt bland alla kort
            const container = document.getElementById('filmstrip-container');
            const cards = container.querySelectorAll('.image-card');
            const sourceIdx = touchDragState.sourceIndex;

            let bestInsertIndex = null;
            let bestMarkerX = 0;
            let bestMarkerTop = 0;
            let bestMarkerHeight = 0;
            let closestDist = Infinity;

            cards.forEach((c, i) => {
                const r = c.getBoundingClientRect();
                const containerRect = container.getBoundingClientRect();
                const cardRelTop = r.top - containerRect.top;

                // Beräkna avstånd till vänster- och högerkant av varje kort
                // Vänsterkant = infoga FÖRE detta kort (index i)
                const leftEdgeX = r.left;
                const leftDist = Math.abs(touch.clientX - leftEdgeX) + Math.abs(touch.clientY - (r.top + r.height / 2)) * 0.5;
                if (leftDist < closestDist && i !== sourceIdx) {
                    closestDist = leftDist;
                    bestInsertIndex = i;
                    bestMarkerX = r.left - containerRect.left - 3;
                    bestMarkerTop = cardRelTop;
                    bestMarkerHeight = r.height;
                }

                // Högerkant = infoga EFTER detta kort (index i+1)
                const rightEdgeX = r.right;
                const rightDist = Math.abs(touch.clientX - rightEdgeX) + Math.abs(touch.clientY - (r.top + r.height / 2)) * 0.5;
                if (rightDist < closestDist) {
                    closestDist = rightDist;
                    bestInsertIndex = i + 1;
                    bestMarkerX = r.right - containerRect.left - 1;
                    bestMarkerTop = cardRelTop;
                    bestMarkerHeight = r.height;
                }
            });

            // Dölj markören om den pekar på samma position (ingen flytt behövs)
            if (bestInsertIndex === sourceIdx || bestInsertIndex === sourceIdx + 1) {
                marker.style.display = 'none';
                touchDragState.insertBeforeIndex = null;
            } else if (bestInsertIndex !== null) {
                marker.style.display = 'block';
                marker.style.left = bestMarkerX + 'px';
                marker.style.top = bestMarkerTop + 'px';
                marker.style.bottom = 'auto';
                marker.style.height = bestMarkerHeight + 'px';
                touchDragState.insertBeforeIndex = bestInsertIndex;
            }
        }

        function touchDragEndGhost(student) {
            const sourceIdx = touchDragState.sourceIndex;
            let insertIdx = touchDragState.insertBeforeIndex;

            // Rensa visuella element
            touchDragCleanup();

            // Utför flytten om vi har en giltig insättningspunkt
            if (insertIdx !== null && insertIdx !== sourceIdx && insertIdx !== sourceIdx + 1) {
                const movedImage = student.images.splice(sourceIdx, 1)[0];
                let finalIdx = insertIdx;
                if (sourceIdx < insertIdx) {
                    finalIdx--;
                }
                student.images.splice(finalIdx, 0, movedImage);
                renderFilmstrip(student);
            }

            setTimeout(() => { blockLightbox = false; }, 300);
        }

        function touchDragCancelGhost() {
            touchDragCleanup();
            setTimeout(() => { blockLightbox = false; }, 300);
        }

        function touchDragCleanup() {
            // Ta bort ghosten
            if (touchDragState.ghostEl) {
                touchDragState.ghostEl.remove();
            }
            // Ta bort markören
            if (touchDragState.markerEl) {
                touchDragState.markerEl.remove();
            }
            // Ta bort source-markering från alla kort
            document.querySelectorAll('.touch-dragging-source').forEach(el => {
                el.classList.remove('touch-dragging-source');
            });

            // Återställ state
            touchDragState.active = false;
            touchDragState.sourceIndex = null;
            touchDragState.ghostEl = null;
            touchDragState.markerEl = null;
            touchDragState.insertBeforeIndex = null;
            touchDragState.pendingCard = null;
            touchDragState.pendingIndex = null;
            touchDragState.dragStarted = false;
        }

        async function getAvailableCameras() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                availableVideoDevices = devices.filter(device => device.kind === 'videoinput');
                const switchBtn = document.getElementById('camera-switch-btn');
                if (switchBtn) {
                    switchBtn.style.display = availableVideoDevices.length > 1 ? 'flex' : 'none';
                }
            } catch (err) {
                console.error("Kunde inte lista kameror:", err);
            }
        }

        async function startCamera() {
            const student = getActiveStudent();
            if (!student) return;

            const modal = document.getElementById('camera-modal');
            const video = document.getElementById('camera-video');
            const counter = document.getElementById('camera-counter');

            counter.innerText = `Tagna bilder: ${student.images.length}`;
            modal.classList.add('active');

            try {
                if (cameraStream) {
                    cameraStream.getTracks().forEach(track => track.stop());
                    cameraStream = null;
                }

                let constraints = {
                    audio: false,
                    video: {
                        facingMode: currentFacingMode,
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                };

                cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = cameraStream;

                await getAvailableCameras();
            } catch (err) {
                console.error("Kameramisslyckande, försöker med fallback:", err);

                try {
                    cameraStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { ideal: currentFacingMode } },
                        audio: false
                    });
                    video.srcObject = cameraStream;
                } catch (fallbackErr) {
                    console.error("Även fallback misslyckades:", fallbackErr);
                    modal.classList.remove('active');
                    showToast("Kunde inte starta kameran. Se till att du tillåtit behörighet och kör via en säker anslutning (HTTPS/localhost).", "error");
                }
            }
        }

        async function switchCamera() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }

            currentFacingMode = (currentFacingMode === 'environment') ? 'user' : 'environment';
            await startCamera();
        }

        function stopCamera() {
            const modal = document.getElementById('camera-modal');
            modal.classList.remove('active');

            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;

        function captureSnapshot() {
            const video = document.getElementById('camera-video');
            const flash = document.getElementById('camera-flash');
            const counter = document.getElementById('camera-counter');
            const student = getActiveStudent();

            if (!video || !student) return;

            flash.classList.remove('flash-active');
            void flash.offsetWidth;
            flash.classList.add('flash-active');


            playShutterSound();

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 1280;
            canvas.height = video.videoHeight || 720;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const base64Data = canvas.toDataURL('image/jpeg', 0.85);
            student.images.push(base64Data);

            counter.innerText = `Tagna bilder: ${student.images.length}`;
        }

        function playShutterSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const bufferSize = audioCtx.sampleRate * 0.1;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);

                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }

                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;

                const filter = audioCtx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 1200;

                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);

                noise.start();
            } catch (e) {
                console.warn("Kunde inte spela klick-ljud:", e);
            }
        }

        function handleImageUpload(event) {
            const files = event.target.files;

            let loadedCount = 0;

            for (let i = 0; i < files.length; i++) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    student.images.push(e.target.result);
                    loadedCount++;

                    if (loadedCount === files.length) {
                        updateBadges();
                        updateBatchButtonState();
                        renderFilmstrip(student);
                        event.target.value = '';

                };
                reader.readAsDataURL(files[i]);
            }
        }
