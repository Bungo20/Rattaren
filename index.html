<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Rättaren - Berget AI Edition</title>
    <!-- Lägg till FontAwesome för snygga och moderna ikoner -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Lägg till Marked.js för att rendera strömmande Markdown till HTML -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-light: #eff6ff;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --border-hover: #cbd5e1;
            --success: #16a34a;
            --danger: #ef4444;
            --radius-lg: 12px;
            --radius-md: 8px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: system-ui, -apple-system, sans-serif; 
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            padding: 24px; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }

        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding-bottom: 20px; 
            border-bottom: 1px solid var(--border); 
            margin-bottom: 24px; 
            flex-wrap: wrap;
            gap: 16px;
        }

        h1 { 
            font-size: 1.6rem; 
            color: var(--text); 
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h1 i {
            color: var(--primary);
        }
        
        .api-config { 
            display: flex; 
            gap: 10px; 
            align-items: center; 
            background: var(--card-bg); 
            padding: 10px 16px; 
            border-radius: var(--radius-md); 
            border: 1px solid var(--border); 
            box-shadow: var(--shadow-sm);
            flex-wrap: wrap;
            width: auto;
        }

        .api-config input { 
            padding: 8px 12px; 
            border: 1px solid var(--border); 
            border-radius: 6px; 
            font-size: 0.9rem; 
            outline: none;
            transition: border-color 0.2s;
        }

        .api-config input:focus {
            border-color: var(--primary);
        }

        .api-config select { 
            padding: 8px 12px; 
            border: 1px solid var(--border); 
            border-radius: 6px; 
            font-size: 0.9rem; 
            outline: none;
            background-color: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            transition: border-color 0.2s;
            max-width: 220px;
        }

        .api-config select:focus {
            border-color: var(--primary);
        }

        .api-config select:disabled {
            background-color: var(--bg);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .main-layout { 
            display: grid; 
            grid-template-columns: 360px 1fr; 
            gap: 24px; 
            flex: 1; 
        }
        
        .sidebar { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            border-radius: var(--radius-lg); 
            padding: 24px; 
            display: flex; 
            flex-direction: column; 
            gap: 24px; 
            box-shadow: var(--shadow-sm);
            max-height: calc(100vh - 120px);
            position: sticky;
            top: 24px;
        }

        .section-title { 
            font-size: 1.05rem; 
            font-weight: 600; 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .nav-item { 
            padding: 14px 16px; 
            border-radius: var(--radius-md); 
            border: 1px solid var(--border); 
            cursor: pointer; 
            background: var(--bg); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: all 0.2s ease; 
        }

        .nav-item:hover { 
            border-color: var(--border-hover); 
            transform: translateY(-1px);
        }

        .nav-item.active { 
            background: var(--primary-light); 
            border-color: var(--primary); 
            color: var(--primary); 
            font-weight: 600; 
            box-shadow: var(--shadow-sm);
        }

        .nav-item .badge { 
            background: var(--text-muted); 
            color: white; 
            padding: 2px 10px; 
            border-radius: 12px; 
            font-size: 0.8rem; 
        }

        .nav-item.active .badge { 
            background: var(--primary); 
        }

        .student-list { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            overflow-y: auto; 
            flex: 1;
            padding-right: 4px;
        }

        .student-list::-webkit-scrollbar {
            width: 6px;
        }
        .student-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .btn { 
            padding: 10px 16px; 
            border: none; 
            border-radius: 6px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            font-size: 0.9rem; 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            user-select: none;
        }

        .btn-primary { 
            background: var(--primary); 
            color: white; 
        }

        .btn-primary:hover { 
            background: var(--primary-hover); 
            transform: translateY(-1px);
        }

        .btn-secondary { 
            background: #f1f5f9; 
            color: var(--text); 
            border: 1px solid var(--border);
        }

        .btn-secondary:hover { 
            background: #e2e8f0; 
        }

        .btn-danger-outline {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid transparent;
            padding: 6px;
            border-radius: 4px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-danger-outline:hover {
            color: var(--danger);
            background: #fee2e2;
            border-color: #fecaca;
        }

        .btn-edit-outline {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid transparent;
            padding: 6px;
            border-radius: 4px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-edit-outline:hover {
            color: var(--primary);
            background: var(--primary-light);
            border-color: #bfdbfe;
        }

        .btn-success { 
            background: var(--success); 
            color: white; 
            width: 100%;
            padding: 14px;
            font-size: 1rem;
        }

        .btn-success:hover { 
            background: #15803d; 
            box-shadow: var(--shadow-md);
        }

        .btn-success:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            width: 100%;
            padding: 14px;
            font-size: 1rem;
        }

        .btn-danger:hover {
            background: #b91c1c;
            box-shadow: var(--shadow-md);
        }

        .sidebar-actions {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .workspace { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            border-radius: var(--radius-lg); 
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            gap: 24px; 
            box-shadow: var(--shadow-sm);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 40px;
            color: var(--text-muted);
            gap: 20px;
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--border-hover);
        }

        .empty-state h3 {
            color: var(--text);
            font-size: 1.5rem;
        }

        .empty-state p {
            max-width: 450px;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        /* Nytt: Rutmönster för kamera- och uppladdningsknappar */
        .upload-grid-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            width: 100%;
        }

        .btn-camera-rapid {
            padding: 24px !important;
            font-size: 1.05rem !important;
            flex-direction: column;
            gap: 12px !important;
            border-radius: var(--radius-md) !important;
            box-shadow: var(--shadow-sm);
        }

        .btn-camera-rapid i {
            font-size: 2rem;
        }
        
        .upload-zone { 
            border: 2px dashed var(--border); 
            border-radius: var(--radius-md); 
            padding: 24px; 
            text-align: center; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            background: var(--bg); 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: var(--shadow-sm);
        }

        .upload-zone:hover { 
            border-color: var(--primary); 
            background: #f0f7ff;
        }

        .upload-zone i {
            font-size: 2rem;
            color: var(--primary);
        }

        .upload-zone input { 
            display: none; 
        }

        .filmstrip { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 20px; 
            background: var(--bg); 
            padding: 20px; 
            border-radius: var(--radius-md); 
            min-height: 180px; 
            border: 1px solid var(--border); 
            position: relative;
        }

        .image-card { 
            position: relative; 
            background: white; 
            border: 1px solid var(--border); 
            border-radius: var(--radius-md); 
            padding: 6px; 
            cursor: grab; 
            user-select: none; 
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.2s ease, border-color 0.2s ease; 
            box-shadow: var(--shadow-sm);
        }

        .image-card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--border-hover);
            transform: translateY(-2px);
        }

        .image-card.dragging { 
            opacity: 0.4; 
            cursor: grabbing;
            border: 2px dashed var(--primary);
            box-shadow: none;
            transform: scale(0.95);
        }

        .image-card.drop-indicator-left::before {
            content: '';
            position: absolute;
            left: -12px;
            top: -2px;
            bottom: -2px;
            width: 4px;
            background: var(--primary);
            border-radius: 4px;
            box-shadow: 0 0 8px var(--primary);
            z-index: 100;
        }

        .image-card.drop-indicator-right::after {
            content: '';
            position: absolute;
            right: -12px;
            top: -2px;
            bottom: -2px;
            width: 4px;
            background: var(--primary);
            border-radius: 4px;
            box-shadow: 0 0 8px var(--primary);
            z-index: 100;
        }

        .image-card img { 
            width: 100%; 
            height: 140px; 
            object-fit: cover; 
            border-radius: 4px; 
            display: block;
            transition: opacity 0.2s;
        }

        .image-card:hover img {
            opacity: 0.95;
        }

        .image-card .page-number { 
            position: absolute; 
            bottom: 12px; 
            left: 12px; 
            background: rgba(15, 23, 42, 0.75); 
            backdrop-filter: blur(4px);
            color: white; 
            padding: 3px 8px; 
            border-radius: 4px; 
            font-size: 0.75rem; 
            font-weight: 500;
        }

        .image-card .delete-btn { 
            position: absolute; 
            top: 10px; 
            right: 10px; 
            background: var(--danger); 
            color: white; 
            border: none; 
            border-radius: 50%; 
            width: 24px; 
            height: 24px; 
            font-size: 11px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: var(--shadow-sm);
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            z-index: 10;
        }

        .image-card:hover .delete-btn {
            opacity: 1;
        }

        .image-card .delete-btn:hover {
            transform: scale(1.1);
            background: #b91c1c;
        }

        .report-section { 
            margin-top: 24px; 
            padding-top: 24px; 
            border-top: 1px solid var(--border); 
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .report-box { 
            background: #f1f5f9; 
            padding: 24px; 
            border-radius: var(--radius-md); 
            border: 1px solid var(--border); 
            font-size: 1rem; 
            line-height: 1.6;
            margin-top: 12px; 
            max-height: 480px; 
            overflow-y: auto; 
            scroll-behavior: smooth;
        }

        /* Specifik styling för renderad Markdown-typografi i rapporten */
        .markdown-body {
            font-size: 1rem;
            line-height: 1.7;
            color: var(--text);
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 {
            color: var(--text);
            font-weight: 700;
            margin-top: 1.4rem;
            margin-bottom: 0.75rem;
        }
        .markdown-body h1 { font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
        .markdown-body h2 { font-size: 1.3rem; border-bottom: 1px solid var(--border); padding-bottom: 4px; margin-top: 1.6rem;}
        .markdown-body h3 { font-size: 1.15rem; }
        .markdown-body p { margin-bottom: 1.1rem; }
        .markdown-body ul, .markdown-body ol { margin-left: 20px; margin-bottom: 1.1rem; }
        .markdown-body ul { list-style-type: disc; }
        .markdown-body ol { list-style-type: decimal; }
        .markdown-body li { margin-bottom: 0.4rem; }
        .markdown-body strong { font-weight: 700; color: #000; }
        .markdown-body blockquote {
            border-left: 4px solid var(--primary);
            padding-left: 12px;
            color: var(--text-muted);
            font-style: italic;
            margin: 1rem 0;
        }
        .markdown-body code {
            background-color: #e2e8f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9rem;
        }
        .markdown-body pre {
            background-color: #e2e8f0;
            padding: 12px;
            border-radius: var(--radius-md);
            overflow-x: auto;
            margin-bottom: 1.1rem;
        }
        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
            font-size: 0.85rem;
        }
        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.1rem;
        }
        .markdown-body th, .markdown-body td {
            border: 1px solid var(--border);
            padding: 8px 12px;
            text-align: left;
        }
        .markdown-body th {
            background-color: #f1f5f9;
            font-weight: 600;
        }

        .export-group { 
            display: flex; 
            gap: 12px; 
            margin-top: 16px; 
        }
        
        .status-badge { 
            font-size: 0.75rem; 
            padding: 4px 10px; 
            border-radius: 20px; 
            font-weight: 600; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-pending { background: #e2e8f0; color: #475569; }
        .status-processing { background: #fef3c7; color: #d97706; animation: pulse 1.5s infinite; }
        .status-done { background: #dcfce7; color: #16a34a; }
        .status-error { background: #fee2e2; color: #dc2626; }

        @keyframes pulse { 
            0% { opacity: 0.6; } 
            50% { opacity: 1; } 
            100% { opacity: 0.6; } 
        }

        /* NYTT: Snabbkamera Overlay */
        .camera-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .camera-modal.active {
            display: flex;
        }
        .camera-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        #camera-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .camera-ui {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 10002;
        }
        .camera-shutter {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            border: 4px solid #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }
        .camera-shutter:active {
            transform: scale(0.9);
        }
        .shutter-inner {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #fff;
        }
        .camera-close-btn {
            background: rgba(239, 68, 68, 0.85) !important;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 14px 28px !important;
            font-size: 1rem !important;
            border-radius: 30px !important;
            width: auto !important;
        }
        .camera-counter {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(4px);
            color: #fff;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .camera-flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 10001;
        }
        .camera-flash.flash-active {
            animation: flashAnimation 0.15s ease-out;
        }
        @keyframes flashAnimation {
            0% { opacity: 0.85; }
            100% { opacity: 0; }
        }

        /* Lightbox för förstorade bilder */
        .lightbox {
            display: none;
            position: fixed;
            top: 0; 
            left: 0;
            width: 100vw; 
            height: 100vh;
            background-color: rgba(15, 23, 42, 0.96);
            backdrop-filter: blur(8px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            user-select: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-close {
            position: absolute;
            top: 24px; 
            right: 32px;
            color: white;
            font-size: 36px;
            font-weight: 300;
            cursor: pointer;
            transition: transform 0.2s, color 0.2s;
            background: none;
            border: none;
            outline: none;
        }

        .lightbox-close:hover { 
            color: var(--danger);
            transform: scale(1.1);
        }

        .lightbox img {
            max-width: 85%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: var(--radius-md);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .lightbox.active img {
            transform: scale(1);
        }

        .lightbox-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            cursor: pointer;
            font-size: 20px;
            border-radius: 50%;
            transition: all 0.2s ease;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-btn:hover { 
            background: rgba(255, 255, 255, 0.25); 
            transform: translateY(-50%) scale(1.05);
        }

        .lightbox-prev { left: 40px; }
        .lightbox-next { right: 40px; }

        .lightbox-caption {
            position: absolute;
            bottom: 30px;
            color: white;
            font-size: 1rem;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 500;
        }

        /* Toast-design */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #0f172a;
            color: white;
            padding: 14px 22px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10000;
            font-weight: 500;
        }
        .toast.active {
            transform: translateY(0);
            opacity: 1;
        }
        .toast-success { border-left: 4px solid var(--success); }
        .toast-error { border-left: 4px solid var(--danger); }
        .toast-info { border-left: 4px solid var(--primary); }

        /* Anpassad confirm-modal (Helt utan inbyggda browser dialogs) */
        .confirm-modal {
            display: none;
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            z-index: 10100;
            justify-content: center;
            align-items: center;
        }
        .confirm-modal.active {
            display: flex;
        }
        .confirm-content {
            background: var(--card-bg);
            padding: 24px;
            border-radius: var(--radius-lg);
            max-width: 400px;
            width: 90%;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .confirm-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        /* MEDIA QUERIES FOR ADAPTIVE LAYOUTS */
        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .sidebar {
                max-height: none;
                position: static;
                padding: 16px;
            }
            .workspace {
                padding: 20px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
            header {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
                padding-bottom: 12px;
                margin-bottom: 16px;
            }
            .api-config {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }
            .api-config input, .api-config select {
                width: 100% !important;
                max-width: none !important;
            }
            /* Horisontell scroll för elevlistan på mobila enheter */
            .student-list {
                flex-direction: row !important;
                overflow-x: auto !important;
                white-space: nowrap;
                gap: 8px !important;
                max-height: none !important;
                padding-bottom: 8px;
            }
            .nav-item {
                display: inline-flex !important;
                flex-shrink: 0;
                padding: 10px 14px !important;
                margin: 0;
                min-width: 150px;
            }
            .sidebar {
                gap: 16px;
                padding: 16px;
            }
            .sidebar-actions {
                flex-direction: column;
            }
            .lightbox-btn {
                width: 48px;
                height: 48px;
                font-size: 16px;
            }
            .lightbox-prev { left: 10px; }
            .lightbox-next { right: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <h1><i class="fa-solid fa-graduation-cap"></i> AI Rättaren</h1>
        <div class="api-config">
            <select id="modelSelect" title="Välj vision-modell" disabled>
                <option value="">Ange API-nyckel först...</option>
            </select>
            <input type="text" id="apiUrl" placeholder="Berget API URL" value="https://api.berget.ai/v1/chat/completions">
            <input type="password" id="apiKey" placeholder="API-nyckel (Sparas lokalt)">
        </div>
    </header>

    <div class="main-layout">
        <!-- VÄNSTERPANEL: NAVIGERING & KÖ -->
        <div class="sidebar">
            <div style="display: flex; flex-direction: column; flex: 1; gap: 12px;">
                <div class="section-title">
                    <span>Elever</span>
                    <button class="btn btn-secondary" style="padding: 6px 12px;" onclick="addStudent()">
                        <i class="fa-solid fa-plus"></i> Lägg till
                    </button>
                </div>
                <div class="student-list" id="student-list-container">
                    <!-- Elever renderas dynamiskt här -->
                </div>
            </div>

            <div class="sidebar-actions">
                <button class="btn btn-success" id="start-btn" onclick="processBatch()" disabled>
                    <i class="fa-solid fa-play"></i> Starta rättning
                </button>
                <button class="btn btn-danger" id="stop-btn" style="display: none;" onclick="cancelBatch()">
                    <i class="fa-solid fa-circle-stop"></i> Avbryt
                </button>
                <!-- Samlingsknapp för alla klara rapporter -->
                <button class="btn btn-secondary" id="export-all-btn" style="display: none; width: 100%;" onclick="exportAllReportsToWord()">
                    <i class="fa-regular fa-copy" style="color: #1e3a8a;"></i> Ladda ner alla rapporter (.doc)
                </button>
            </div>
        </div>

        <!-- HÖGERPANEL: ARBETSYTA FÖR BILDER OCH RESULTAT -->
        <div class="workspace" id="workspace-container">
            <!-- Renderas dynamiskt baserat på om det finns elever eller ej -->
        </div>
    </div>

    <!-- HELSKÄRMS-LIGHTBOX -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
        <button class="lightbox-close" onclick="closeLightbox(event)"><i class="fa-solid fa-xmark"></i></button>
        <button class="lightbox-btn lightbox-prev" onclick="navigateLightbox(-1, event)"><i class="fa-solid fa-chevron-left"></i></button>
        <img id="lightbox-img" src="" alt="Helskärmsvisning" onclick="event.stopPropagation()">
        <button class="lightbox-btn lightbox-next" onclick="navigateLightbox(1, event)"><i class="fa-solid fa-chevron-right"></i></button>
        <div id="lightbox-caption" class="lightbox-caption">Sida X av Y</div>
    </div>

    <!-- SNABBKAMERA MODAL -->
    <div id="camera-modal" class="camera-modal">
        <div class="camera-container">
            <video id="camera-video" autoplay playsinline></video>
            <div class="camera-flash" id="camera-flash"></div>
            <div class="camera-ui">
                <div class="camera-counter" id="camera-counter">Tagna bilder: 0</div>
                <button class="camera-shutter" onclick="captureSnapshot()">
                    <div class="shutter-inner"></div>
                </button>
                <button class="btn btn-danger camera-close-btn" onclick="stopCamera()">
                    <i class="fa-solid fa-xmark"></i> Klar
                </button>
            </div>
        </div>
    </div>

    <!-- BEKRÄFTELSE MODAL (Helt utan browser alerts) -->
    <div id="confirm-modal" class="confirm-modal">
        <div class="confirm-content">
            <h3 id="confirm-title">Är du säker?</h3>
            <p id="confirm-message">Detta går inte att ångra.</p>
            <div class="confirm-actions">
                <button class="btn btn-secondary" onclick="handleConfirm(false)">Avbryt</button>
                <button class="btn btn-danger" onclick="handleConfirm(true)">Ja, ta bort</button>
            </div>
        </div>
    </div>

    <script>
        let session = {
            students: []
        };
        
        let currentView = null; 
        let draggedIndex = null; 
        let lightboxIndex = 0; 
        let currentAbortController = null; // Styr avbrytande av API-anrop
        let isProcessing = false; // Flagga för att spåra batch-körningens status
        let cameraStream = null; // Förvarar videoströmmen för snabbkameran
        let confirmResolve = null; // Löser bekräftelsemodalen asynkront

        // Konfigurera Marked.js så att vanliga radbrytningar bryts till <br> i Markdown
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        // Läs sparad API-nyckel från localStorage
        document.getElementById('apiKey').value = localStorage.getItem('berget_api_key') || '';
        
        let debounceTimer;
        document.getElementById('apiKey').addEventListener('input', (e) => {
            localStorage.setItem('berget_api_key', e.target.value);
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(updateModelsDropdown, 600);
        });

        document.getElementById('modelSelect').addEventListener('change', (e) => {
            localStorage.setItem('berget_selected_model', e.target.value);
        });

        async function updateModelsDropdown() {
            const apiKey = document.getElementById('apiKey').value;
            const modelSelect = document.getElementById('modelSelect');
            if (!apiKey) {
                modelSelect.innerHTML = '<option value="">Ange API-nyckel först...</option>';
                modelSelect.disabled = true;
                return;
            }

            modelSelect.innerHTML = '<option value="">Hämtar modeller...</option>';
            modelSelect.disabled = true;

            try {
                const apiUrlVal = document.getElementById('apiUrl').value;
                let modelsUrl = 'https://api.berget.ai/v1/models';
                if (apiUrlVal) {
                    try {
                        const urlObj = new URL(apiUrlVal);
                        urlObj.pathname = urlObj.pathname.replace(/\/chat\/completions\/?$/, '/models');
                        modelsUrl = urlObj.toString();
                    } catch (e) {
                        console.warn("Kunde inte parsa API URL för att bygga modellsökväg, använder fallback", e);
                    }
                }

                const response = await fetch(modelsUrl, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                const models = Array.isArray(data) ? data : (data.data || []);
                const visionModels = models.filter(m => m.capabilities && m.capabilities.vision === true);

                if (visionModels.length === 0) {
                    modelSelect.innerHTML = '<option value="">Inga vision-modeller</option>';
                    return;
                }

                modelSelect.innerHTML = '';
                visionModels.forEach(model => {
                    const opt = document.createElement('option');
                    opt.value = model.id;
                    opt.textContent = model.name || model.id;
                    modelSelect.appendChild(opt);
                });

                modelSelect.disabled = false;

                const savedModel = localStorage.getItem('berget_selected_model');
                const defaultPreferredModel = "moonshotai/Kimi-K2.6";
                const optionsArray = Array.from(modelSelect.options);
                
                let modelToSelect = null;
                if (savedModel && optionsArray.some(opt => opt.value === savedModel)) {
                    modelToSelect = savedModel;
                } else if (optionsArray.some(opt => opt.value === defaultPreferredModel)) {
                    modelToSelect = defaultPreferredModel;
                } else {
                    modelToSelect = modelSelect.value;
                }

                if (modelToSelect) {
                    modelSelect.value = modelToSelect;
                    localStorage.setItem('berget_selected_model', modelToSelect);
                }
            } catch (error) {
                console.error("Misslyckades att hämta modeller:", error);
                modelSelect.innerHTML = '<option value="">Fel vid hämtning (API-nyckel?)</option>';
                modelSelect.disabled = true;
            }
        }

        function showToast(message, type = 'info') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            
            let icon = '<i class="fa-solid fa-circle-info" style="color: var(--primary)"></i>';
            if (type === 'success') icon = '<i class="fa-solid fa-circle-check" style="color: var(--success)"></i>';
            if (type === 'error') icon = '<i class="fa-solid fa-circle-exclamation" style="color: var(--danger)"></i>';

            toast.innerHTML = `${icon} <span>${message}</span>`;
            document.body.appendChild(toast);

            setTimeout(() => toast.classList.add('active'), 10);

            setTimeout(() => {
                toast.classList.remove('active');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // Anpassat bekräftelsesystem asynkront
        function customConfirm(title, message) {
            return new Promise((resolve) => {
                const modal = document.getElementById('confirm-modal');
                document.getElementById('confirm-title').innerText = title;
                document.getElementById('confirm-message').innerText = message;
                modal.classList.add('active');
                confirmResolve = resolve;
            });
        }

        function handleConfirm(yes) {
            const modal = document.getElementById('confirm-modal');
            modal.classList.remove('active');
            if (confirmResolve) {
                confirmResolve(yes);
                confirmResolve = null;
            }
        }

        function addStudent() {
            const name = prompt("Ange elevens namn (eller lämna tomt för anonymisering):") || `Elev ${session.students.length + 1}`;
            const newStudent = {
                id: Date.now(),
                name: name,
                images: [],
                report: '',
                status: 'pending' 
            };
            session.students.push(newStudent);
            currentView = newStudent.id;
            
            updateBatchButtonState();
            renderStudentList();
            renderWorkspace();
        }

        function renameStudent(studentId, event) {
            if (event) event.stopPropagation();
            const student = session.students.find(s => s.id === studentId);
            if (!student) return;
            const newName = prompt("Ange nytt namn för eleven:", student.name);
            if (newName !== null && newName.trim() !== "") {
                student.name = newName.trim();
                renderStudentList();
                renderWorkspace();
            }
        }

        async function deleteStudent(studentId, event) {
            event.stopPropagation();
            const ok = await customConfirm("Ta bort elev?", "Är du säker på att du vill ta bort denna elev och alla tillhörande bilder?");
            if (!ok) return;
            
            session.students = session.students.filter(s => s.id !== studentId);
            
            if (currentView === studentId) {
                currentView = session.students.length > 0 ? session.students[0].id : null;
            }
            
            updateBatchButtonState();
            renderStudentList();
            renderWorkspace();
        }

        function switchView(studentId) {
            currentView = studentId;
            renderStudentList();
            renderWorkspace();
        }

        function updateBatchButtonState() {
            const hasImagesToProcess = session.students.some(s => s.images.length > 0);
            const startBtn = document.getElementById('start-btn');
            if (startBtn) {
                startBtn.disabled = !hasImagesToProcess || isProcessing;
            }
            updateExportAllButtonState();
        }

        function updateExportAllButtonState() {
            const completedReports = session.students.filter(s => s.report && s.status === 'done');
            const exportAllBtn = document.getElementById('export-all-btn');
            if (exportAllBtn) {
                if (completedReports.length > 0 && !isProcessing) {
                    exportAllBtn.style.display = 'inline-flex';
                } else {
                    exportAllBtn.style.display = 'none';
                }
            }
        }

        function renderStudentList() {
            const container = document.getElementById('student-list-container');
            container.innerHTML = '';
            
            if (session.students.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; color: var(--text-muted); padding: 20px 0; font-size: 0.9rem;">
                        Inga elever tillagda i kön ännu.
                    </div>`;
                return;
            }

            session.students.forEach(student => {
                const div = document.createElement('div');
                div.id = `nav-student-${student.id}`;
                div.className = `nav-item ${currentView === student.id ? 'active' : ''}`;
                div.onclick = () => switchView(student.id);
                
                let statusClass = `status-${student.status}`;
                let statusText = 'Köad';
                if (student.status === 'processing') statusText = 'Rättar...';
                else if (student.status === 'done') statusText = 'Klar';
                else if (student.status === 'error') statusText = 'Fel';

                div.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;">
                        <span class="status-badge ${statusClass}" style="flex-shrink: 0;">${statusText}</span>
                        <strong style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${student.name}</strong>
                    </div>
                    <div style="display: flex; align-items: center; gap: 4px; flex-shrink: 0; margin-left: 8px;">
                        <span class="badge" id="badge-student-${student.id}">${student.images.length}</span>
                        <button class="btn-edit-outline" onclick="renameStudent(${student.id}, event)" title="Byt namn">
                            <i class="fa-regular fa-pen-to-square"></i>
                        </button>
                        <button class="btn-danger-outline" onclick="deleteStudent(${student.id}, event)" title="Ta bort elev">
                            <i class="fa-regular fa-trash-can"></i>
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function renderWorkspace() {
            const container = document.getElementById('workspace-container');
            container.innerHTML = '';

            if (!currentView || session.students.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-folder-open"></i>
                        <h3>Välkommen till Rättaren!</h3>
                        <p>Kom igång genom att lägga till din första elev i listan till vänster. Sedan kan du enkelt ladda upp och sortera elevens inlämnade provsidor.</p>
                        <button class="btn btn-primary" onclick="addStudent()">
                            <i class="fa-solid fa-plus"></i> Lägg till första eleven
                        </button>
                    </div>
                `;
                return;
            }

            const student = session.students.find(s => s.id === currentView);
            if (!student) return;

            const hasReport = !!student.report;
            const parsedReport = hasReport ? marked.parse(student.report) : '';

            container.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
                    <h2 style="font-size: 1.4rem; font-weight: 700; display: flex; align-items: center; gap: 8px;">
                        Bearbetar: ${student.name}
                        <button class="btn-edit-outline" style="padding: 4px 8px; font-size: 0.85rem; border: 1px solid var(--border);" onclick="renameStudent(${student.id}, event)" title="Ändra namn">
                            <i class="fa-regular fa-pen-to-square"></i> Ändra namn
                        </button>
                    </h2>
                    <span class="status-badge status-${student.status}">
                        ${student.status === 'pending' ? 'Väntar på körning' : student.status === 'processing' ? 'Rättningsrapport skapas...' : student.status === 'done' ? 'Rättad och klar' : 'Ett fel uppstod'}
                    </span>
                </div>
                
                <p id="workspace-instructions" style="color: var(--text-muted); font-size: 0.95rem; line-height: 1.5; display: ${hasReport ? 'none' : 'block'};">
                    Fotografera eller ladda upp elevens provsidor i rätt ordning (samt eventuella provinstruktioner/betygskriterier först). 
                    Klicka på en bild för att förstora den i <strong>helskärm</strong> eller <strong>dra och släpp</strong> bilderna för att sortera dem.
                </p>

                <!-- Bildinmatning (Anpassad för Snabbkamera + Fallback filväljare) -->
                <div id="upload-zone-wrapper" style="display: ${hasReport ? 'none' : 'block'}; width: 100%;">
                    <div class="upload-grid-buttons">
                        <button class="btn btn-primary btn-camera-rapid" onclick="startCamera()">
                            <i class="fa-solid fa-camera"></i> Starta Snabbkamera
                        </button>
                        <div class="upload-zone" onclick="document.getElementById('file-input').click()">
                            <i class="fa-solid fa-cloud-arrow-up"></i>
                            <div>
                                <span style="font-weight: 600; display: block; margin-bottom: 4px;">Välj filer / Kamerarulle</span>
                                <span style="color: var(--text-muted); font-size: 0.85rem;">För att välja sparade bilder</span>
                            </div>
                            <input type="file" id="file-input" accept="image/*" multiple onchange="handleImageUpload(event)">
                        </div>
                    </div>
                </div>

                <!-- Filmremsa / Bildgalleri -->
                <div class="filmstrip" id="filmstrip-container">
                    <!-- Bildkort matas in här via JS -->
                </div>

                <!-- Rapport / Output -->
                <div class="report-section" id="report-section-container" style="display: ${hasReport ? 'block' : 'none'};">
                    <div class="report-header">
                        <h3 style="font-size: 1.15rem; font-weight: 700;"><i class="fa-solid fa-file-invoice"></i> Genererad Rättningsrapport</h3>
                    </div>
                    <div class="export-group" style="margin-top: 8px; margin-bottom: 16px;">
                        <button class="btn btn-secondary" onclick="exportToWord()">
                            <i class="fa-regular fa-file-word" style="color: #1e3a8a;"></i> Ladda ner som Word (.doc)
                        </button>
                        <button class="btn btn-secondary" onclick="exportToEmail()">
                            <i class="fa-regular fa-envelope"></i> Skicka som e-post
                        </button>
                    </div>
                    <div class="report-box markdown-body" id="report-text-box" style="margin-top: 0;">${parsedReport}</div>
                </div>
            `;

            renderFilmstrip(student);
        }

        function renderFilmstrip(student) {
            const container = document.getElementById('filmstrip-container');
            if (!container) return;
            container.innerHTML = '';
            
            if (student.images.length === 0) {
                container.style.display = 'none';
                return;
            }
            
            container.style.display = 'grid';

            student.images.forEach((base64Data, index) => {
                const card = document.createElement('div');
                card.className = 'image-card';
                card.setAttribute('draggable', true);
                card.setAttribute('data-index', index);
                
                card.onclick = () => openLightbox(index);

                card.ondragstart = (e) => {
                    draggedIndex = index;
                    card.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                };

                card.ondragend = () => {
                    card.classList.remove('dragging');
                    document.querySelectorAll('.image-card').forEach(el => {
                        el.classList.remove('drop-indicator-left', 'drop-indicator-right');
                    });
                };

                card.ondragover = (e) => {
                    e.preventDefault();
                    if (draggedIndex === index) return; 

                    const rect = card.getBoundingClientRect();
                    const next = (e.clientX - rect.left) > (rect.width / 2);
                    
                    document.querySelectorAll('.image-card').forEach(el => {
                        el.classList.remove('drop-indicator-left', 'drop-indicator-right');
                    });

                    if (next) {
                        if (index + 1 === draggedIndex) return; 
                        card.classList.add('drop-indicator-right');
                    } else {
                        if (index - 1 === draggedIndex) return; 
                        card.classList.add('drop-indicator-left');
                    }
                };

                card.ondragleave = () => {
                    card.classList.remove('drop-indicator-left', 'drop-indicator-right');
                };

                card.ondrop = (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.image-card').forEach(el => {
                        el.classList.remove('drop-indicator-left', 'drop-indicator-right');
                    });
                    
                    const rect = card.getBoundingClientRect();
                    const next = (e.clientX - rect.left) > (rect.width / 2);
                    let targetIndex = parseInt(card.getAttribute('data-index'));
                    
                    if (next) {
                        targetIndex = targetIndex + 1;
                    }
                    
                    if (draggedIndex !== null && targetIndex !== draggedIndex) {
                        const movedImage = student.images.splice(draggedIndex, 1)[0];
                        let insertIndex = targetIndex;
                        if (draggedIndex < targetIndex) {
                            insertIndex--;
                        }
                        student.images.splice(insertIndex, 0, movedImage);
                        renderFilmstrip(student);
                    }
                    draggedIndex = null;
                };

                card.innerHTML = `
                    <button class="delete-btn" onclick="deleteImage(${index}, event)" title="Ta bort bild">✕</button>
                    <img src="${base64Data}" alt="Sida ${index + 1}">
                    <div class="page-number">Sida ${index + 1}</div>
                `;
                container.appendChild(card);
            });
        }

        // STARTA INBYGGD SNABBKAMERA
        async function startCamera() {
            const student = session.students.find(s => s.id === currentView);
            if (!student) return;

            const modal = document.getElementById('camera-modal');
            const video = document.getElementById('camera-video');
            const counter = document.getElementById('camera-counter');
            
            counter.innerText = `Tagna bilder: ${student.images.length}`;
            modal.classList.add('active');

            try {
                // Begär baksideskamera (environment) och hög upplösning
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { ideal: "environment" },
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    },
                    audio: false
                });
                video.srcObject = cameraStream;
            } catch (err) {
                console.error("Kameramisslyckande:", err);
                modal.classList.remove('active');
                showToast("Kunde inte starta kameran. Se till att du tillåtit behörighet och kör via en säker anslutning (HTTPS/localhost). Använd standard filväljaren istället!", "error");
            }
        }

        // STÄNG SNABBKAMERAN
        function stopCamera() {
            const modal = document.getElementById('camera-modal');
            modal.classList.remove('active');

            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }

            const student = session.students.find(s => s.id === currentView);
            if (student) {
                updateBadges();
                updateBatchButtonState();
                renderFilmstrip(student);
            }
        }

        // FÅNGA EN BILD (SNAPSHOT)
        function captureSnapshot() {
            const video = document.getElementById('camera-video');
            const flash = document.getElementById('camera-flash');
            const counter = document.getElementById('camera-counter');
            const student = session.students.find(s => s.id === currentView);

            if (!video || !student) return;

            // Trigger visuell flash-effekt
            flash.classList.remove('flash-active');
            void flash.offsetWidth; // Trigger reflow för CSS-animering
            flash.classList.add('flash-active');

            // Spela upp syntetiserat slutarljud i realtid (Helt lokalt via Web Audio API)
            playShutterSound();

            // Rita av bildrutan på en osynlig canvas
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 1280;
            canvas.height = video.videoHeight || 720;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Spara som Base64 i elevens bildpaket
            const base64Data = canvas.toDataURL('image/jpeg', 0.85);
            student.images.push(base64Data);

            counter.innerText = `Tagna bilder: ${student.images.length}`;
        }

        // Syntetiserar ett "kamera klick-ljud" utan externa ljudresurser
        function playShutterSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const bufferSize = audioCtx.sampleRate * 0.1; // 100ms
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }

                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;

                const filter = audioCtx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 1200;

                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);

                noise.start();
            } catch (e) {
                console.warn("Kunde inte spela klick-ljud:", e);
            }
        }

        function handleImageUpload(event) {
            const files = event.target.files;
            if (!files.length) return;

            const student = session.students.find(s => s.id === currentView);
            if (!student) return;

            let loadedCount = 0;

            for (let i = 0; i < files.length; i++) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    student.images.push(e.target.result);
                    loadedCount++;
                    
                    if (loadedCount === files.length) {
                        updateBadges();
                        updateBatchButtonState();
                        renderFilmstrip(student);
                        event.target.value = ''; 
                    }
                };
                reader.readAsDataURL(files[i]);
            }
        }

        function deleteImage(index, event) {
            event.stopPropagation(); 
            const student = session.students.find(s => s.id === currentView);
            if (!student) return;

            student.images.splice(index, 1);
            updateBadges();
            updateBatchButtonState();
            renderFilmstrip(student);
        }

        function updateBadges() {
            session.students.forEach(s => {
                const badge = document.getElementById(`badge-student-${s.id}`);
                if (badge) badge.innerText = s.images.length;
            });
        }

        function openLightbox(index) {
            const student = session.students.find(s => s.id === currentView);
            if (!student || !student.images[index]) return;
            
            lightboxIndex = index;
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            const caption = document.getElementById('lightbox-caption');
            
            img.src = student.images[index];
            caption.innerText = `Sida ${index + 1} av ${student.images.length}`;
            
            lightbox.classList.add('active');
            
            document.addEventListener('keydown', handleLightboxKeyboard);
        }

        function closeLightbox(event) {
            if (event) event.stopPropagation();
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
            
            document.removeEventListener('keydown', handleLightboxKeyboard);
        }

        function navigateLightbox(direction, event) {
            if (event) event.stopPropagation();
            const student = session.students.find(s => s.id === currentView);
            if (!student) return;

            lightboxIndex += direction;
            if (lightboxIndex >= student.images.length) lightboxIndex = 0;
            if (lightboxIndex < 0) lightboxIndex = student.images.length - 1;

            const img = document.getElementById('lightbox-img');
            const caption = document.getElementById('lightbox-caption');
            
            img.src = student.images[lightboxIndex];
            caption.innerText = `Sida ${lightboxIndex + 1} av ${student.images.length}`;
        }

        function handleLightboxKeyboard(e) {
            if (e.key === 'ArrowRight') navigateLightbox(1);
            else if (e.key === 'ArrowLeft') navigateLightbox(-1);
            else if (e.key === 'Escape') closeLightbox();
        }

        async function processBatch() {
            const apiKey = document.getElementById('apiKey').value;
            const apiUrl = document.getElementById('apiUrl').value;

            if (!apiKey) {
                showToast("Du måste ange din Berget AI API-nyckel i sidhuvudet först.", "error");
                return;
            }

            const activeStudents = session.students.filter(s => s.images.length > 0);
            if (activeStudents.length === 0) {
                showToast("Det finns inga elever med uppladdade bilder i kön.", "error");
                return;
            }

            isProcessing = true;
            const startBtn = document.getElementById('start-btn');
            const stopBtn = document.getElementById('stop-btn');
            
            startBtn.disabled = true;
            startBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Bearbetar kö...`;
            stopBtn.style.display = 'inline-flex';
            updateExportAllButtonState();

            for (let student of session.students) {
                if (!isProcessing) break;
                if (student.images.length === 0) continue;
                
                student.status = 'processing';
                student.report = ''; 
                renderStudentList();
                if (currentView === student.id) renderWorkspace();

                try {
                    // Skapa en ny AbortController för varje enskild elevs anrop
                    currentAbortController = new AbortController();
                    
                    await callBergetAI(apiUrl, apiKey, student, currentAbortController.signal, (chunk) => {
                        student.report += chunk;
                        
                        if (currentView === student.id) {
                            const reportSection = document.getElementById('report-section-container');
                            const reportTextBox = document.getElementById('report-text-box');
                            const workspaceInstructions = document.getElementById('workspace-instructions');
                            const uploadZoneWrapper = document.getElementById('upload-zone-wrapper');
                            
                            if (workspaceInstructions) workspaceInstructions.style.display = 'none';
                            if (uploadZoneWrapper) uploadZoneWrapper.style.display = 'none';

                            if (reportSection && reportTextBox) {
                                reportSection.style.display = 'block';
                                // Rendera live-strömmad Markdown till HTML via Marked
                                reportTextBox.innerHTML = marked.parse(student.report);
                                reportTextBox.scrollTop = reportTextBox.scrollHeight;
                            }
                        }
                    });
                    
                    if (isProcessing) {
                        student.status = 'done';
                    }
                } catch (error) {
                    if (error.name === 'AbortError') {
                        console.log("Anropet avbröts av användaren.");
                    } else {
                        console.error("API Fel:", error);
                        student.report = `Ett fel uppstod vid kommunikation med Berget AI: ${error.message}`;
                        student.status = 'error';
                    }
                }

                renderStudentList();
                if (currentView === student.id) renderWorkspace();
            }

            resetBatchState();
        }

        // Avbryter hela pågående batch-körning
        function cancelBatch() {
            if (!isProcessing) return;
            isProcessing = false;
            
            if (currentAbortController) {
                currentAbortController.abort();
            }
            
            showToast("Körningen avbröts av användaren.", "error");
            
            // Markera ofullständiga elever som avbrutna
            session.students.forEach(s => {
                if (s.status === 'processing') {
                    s.status = 'error';
                    s.report += "\n\n[Rättningen avbröts av användaren]";
                }
            });
            
            resetBatchState();
            renderStudentList();
            renderWorkspace();
        }

        function resetBatchState() {
            isProcessing = false;
            currentAbortController = null;
            
            const startBtn = document.getElementById('start-btn');
            const stopBtn = document.getElementById('stop-btn');
            
            if (startBtn) {
                startBtn.disabled = false;
                startBtn.innerHTML = `<i class="fa-solid fa-play"></i> Starta rättning`;
            }
            if (stopBtn) {
                stopBtn.style.display = 'none';
            }
            updateBatchButtonState();
            updateExportAllButtonState();
        }

        async function callBergetAI(url, key, student, signal, onChunk) {
            const contentArray = [];

            contentArray.push({
                type: "text",
                text: `Du är en svensk legitimerad lärare som rättar ett inlämnat skriftligt prov. 
                       Här är bilderna på elevens lösning (namn: ${student.name}) i kronologisk ordning.
                       Sidorna kan innehålla provinstruktioner i början, följt av elevens egna handskrivna eller skrivna lösningar.
                       Observera att elevens svar kan sträcka sig över flera sidor och fortsätta naturligt på nästa bild. Analysera hela sammanhanget.
                       
                       Skriv en utförlig rättningsrapport på svenska. Svara ALLTID formaterat som ren och vacker Markdown (utan block-kodsomslag som \`\`\`markdown).
                       Rapporten ska innehålla:
                       1. Bedömning utifrån eventuellt angivna instruktioner (eller generella betygskriterier för ämnet).
                       2. Elevens poäng eller indikerad betygsnivå.
                       3. Konstruktiv feedback med elevens specifika styrkor.
                       4. Utvecklingsområden och konkreta tips på hur eleven kan förbättra sina svar framöver.`
            });

            student.images.forEach((base64, index) => {
                contentArray.push({ type: "text", text: `[Provsida ${index + 1}]` });
                contentArray.push({
                    type: "image_url",
                    image_url: { url: base64 }
                });
            });

            const modelSelectVal = document.getElementById('modelSelect').value;
            const payload = {
                model: modelSelectVal || "moonshotai/Kimi-K2.6",
                messages: [
                    {
                        role: "user",
                        content: contentArray
                    }
                ],
                temperature: 0.3,
                stream: true 
            };

            const response = await fetch(url, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${key}`
                },
                body: JSON.stringify(payload),
                signal: signal // Skickar med abort-signalen till nätverksanropet
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errText}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            let buffer = "";

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split("\n");
                
                buffer = lines.pop();

                for (const line of lines) {
                    const cleanedLine = line.trim();
                    if (!cleanedLine) continue;
                    if (cleanedLine === "data: [DONE]") continue;

                    if (cleanedLine.startsWith("data: ")) {
                        try {
                            const jsonStr = cleanedLine.slice(6);
                            const parsed = JSON.parse(jsonStr);
                            const deltaContent = parsed.choices?.[0]?.delta?.content || "";
                            if (deltaContent) {
                                onChunk(deltaContent);
                            }
                        } catch (e) {
                            console.warn("Kunde inte tolka strömmande rad:", cleanedLine, e);
                        }
                    }
                }
            }
        }

        function exportToWord() {
            const student = session.students.find(s => s.id === currentView);
            if (!student || !student.report) return;

            const htmlContent = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><title>Rättningsrapport: ${student.name}</title>
                <style>
                    body { font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; color: #333; margin: 40px; }
                    h2 { color: #1e3a8a; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; }
                    p { font-size: 11pt; margin-bottom: 12px; }
                    ul, ol { margin-left: 20px; }
                    li { font-size: 11pt; margin-bottom: 6px; }
                </style>
                </head>
                <body>
                    <h2>Rättningsrapport: ${student.name}</h2>
                    <div style="margin-top: 20px;">
                        ${marked.parse(student.report)}
                    </div>
                </body>
                </html>
            `;

            const blob = new Blob(['\ufeff' + htmlContent], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Rattning_${student.name.replace(/\s+/g, '_')}.doc`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast("Rapport nedladdad som Word-fil!", "success");
        }

        function exportAllReportsToWord() {
            const completedStudents = session.students.filter(s => s.report && s.status === 'done');
            if (completedStudents.length === 0) {
                showToast("Det finns inga klara rapporter att ladda ner.", "error");
                return;
            }

            let combinedHtml = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head>
                    <title>Samlade Rättningsrapporter</title>
                    <style>
                        body { font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; color: #333; margin: 40px; }
                        h1 { color: #1e3a8a; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; margin-top: 0; }
                        h2 { color: #1e3a8a; border-bottom: 2px solid #e2e8f0; padding-bottom: 6px; margin-top: 24px; }
                        p { font-size: 11pt; margin-bottom: 12px; }
                        ul, ol { margin-left: 20px; }
                        li { font-size: 11pt; margin-bottom: 6px; }
                        .page-break { page-break-before: always; }
                    </style>
                </head>
                <body>
            `;

            completedStudents.forEach((student, index) => {
                const pageBreakClass = index > 0 ? 'class="page-break"' : '';
                combinedHtml += `
                    <div ${pageBreakClass}>
                        <h1>Rättningsrapport: ${student.name}</h1>
                        <div style="margin-top: 20px;">
                            ${marked.parse(student.report)}
                        </div>
                    </div>
                `;
            });

            combinedHtml += `
                </body>
                </html>
            `;

            const blob = new Blob(['\ufeff' + combinedHtml], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Alla_Rattningsrapporter_${new Date().toISOString().slice(0,10)}.doc`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast("Alla rapporter har laddats ner i ett samlat dokument!", "success");
        }

        function exportToEmail() {
            const student = session.students.find(s => s.id === currentView);
            if (!student || !student.report) return;

            const subject = encodeURIComponent(`Rättningsrapport: ${student.name}`);
            const body = encodeURIComponent(student.report);
            
            window.location.href = `mailto:?subject=${subject}&body=${body}`;
        }

        window.onload = function() {
            if (session.students.length === 0) {
                const firstStudent = {
                    id: Date.now(),
                    name: "Elev 1",
                    images: [],
                    report: '',
                    status: 'pending'
                };
                session.students.push(firstStudent);
                currentView = firstStudent.id;
            }
            updateBatchButtonState();
            renderStudentList();
            renderWorkspace();
            
            // Hämta tillgängliga modeller vid uppstart om nyckel finns sparad
            if (document.getElementById('apiKey').value) {
                updateModelsDropdown();
            }
        };
    </script>
